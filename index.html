<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>WizhuB • Cinematic Experience</title>
  <!-- Google Fonts + Tailwind (lightweight, used only for utilities) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Override Tailwind defaults with custom CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* ---------- GLOBAL RESET & CUSTOM PROPERTIES ---------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at 10% 20%, #0a0c10, #030507);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: #ededed;
      scroll-behavior: smooth;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #1a1d24;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb {
      background: #facc15;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #e5b80b;
    }

    /* Glassmorphism navbar */
    .glass-nav {
      background: rgba(8, 10, 14, 0.75);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(250, 204, 21, 0.2);
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    /* Movie cards – neomorphic / glassmorphic */
    .movie-card {
      background: rgba(20, 22, 31, 0.75);
      backdrop-filter: blur(4px);
      border-radius: 1.25rem;
      overflow: hidden;
      transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.03);
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }
    .movie-card:hover {
      transform: translateY(-8px) scale(1.02);
      border-color: rgba(250, 204, 21, 0.4);
      box-shadow: 0 20px 30px -10px rgba(0,0,0,0.7), 0 0 0 1px rgba(250,204,21,0.1);
    }
    .movie-card img {
      transition: transform 0.4s ease;
    }
    .movie-card:hover img {
      transform: scale(1.03);
    }

    /* Progress overlay on continue card */
    .progress-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 4px;
      background: linear-gradient(90deg, #facc15, #ffb347);
      width: 0%;
      transition: width 0.3s ease;
      border-radius: 2px;
    }

    /* Delete button hover effect */
    .delete-btn {
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      transition: all 0.2s;
    }
    .delete-btn:hover {
      background: #e53935;
      color: white;
      transform: scale(1.05);
    }

    /* Player panel – elegant glass panel */
    .player-panel {
      background: rgba(12, 14, 20, 0.85);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(250,204,21,0.2);
      border-radius: 1.5rem;
      box-shadow: 0 25px 40px -12px rgba(0,0,0,0.5);
      transition: all 0.3s;
    }

    /* Embed container with subtle border glow */
    .embed-container {
      background: #000;
      border-radius: 1rem;
      overflow: hidden;
      aspect-ratio: 16/9;
      box-shadow: 0 0 0 1px rgba(250,204,21,0.1), 0 10px 25px -5px black;
    }

    /* Episode navigation buttons */
    .episode-nav button {
      background: #1e212b;
      border: none;
      padding: 0.4rem 1.2rem;
      border-radius: 2rem;
      font-size: 0.8rem;
      font-weight: 500;
      transition: all 0.2s;
      color: #ccc;
    }
    .episode-nav button:hover:not(:disabled) {
      background: #facc15;
      color: #0a0c10;
      transform: scale(1.02);
    }
    .episode-nav button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* Select dropdowns – modern style */
    select, input[type="number"] {
      background: #1a1d24;
      border: 1px solid #2d2f3e;
      border-radius: 2rem;
      padding: 0.4rem 1rem;
      font-size: 0.85rem;
      color: white;
      transition: all 0.2s;
      cursor: pointer;
    }
    select:hover, input[type="number"]:hover {
      border-color: #facc15;
    }
    select:focus, input:focus {
      outline: none;
      border-color: #facc15;
      box-shadow: 0 0 0 2px rgba(250,204,21,0.2);
    }

    /* Buttons */
    .btn-primary {
      background: linear-gradient(135deg, #facc15, #e5b80b);
      color: #0a0c10;
      font-weight: 600;
      padding: 0.4rem 1.2rem;
      border-radius: 2rem;
      transition: all 0.2s;
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(250,204,21,0.3);
    }
    .btn-secondary {
      background: #2a2c38;
      color: #ddd;
      transition: all 0.2s;
    }
    .btn-secondary:hover {
      background: #3a3e4c;
    }

    /* Loading spinner */
    .loading-spinner {
      width: 24px;
      height: 24px;
      border: 2px solid rgba(250,204,21,0.2);
      border-top-color: #facc15;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Horizontal scroll container (continue watching) */
    .horizontal-scroll {
      display: flex;
      gap: 1.2rem;
      overflow-x: auto;
      scrollbar-width: thin;
      padding-bottom: 0.75rem;
    }
    .horizontal-scroll .movie-card {
      flex: 0 0 160px;
    }

    /* Headings */
    h2 {
      font-weight: 600;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #fff, #ccc);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    /* Modal modern */
    .modal-content {
      background: #12141c;
      backdrop-filter: blur(12px);
      border: 1px solid rgba(250,204,21,0.25);
      box-shadow: 0 20px 35px -10px black;
    }

    /* Source order item */
    .source-item {
      background: #1e212b;
      border-radius: 1rem;
      margin-bottom: 0.6rem;
      padding: 0.6rem;
      transition: 0.1s;
    }

    /* Smooth focus rings */
    button:focus-visible, a:focus-visible, input:focus-visible {
      outline: 2px solid #facc15;
      outline-offset: 2px;
    }
  </style>
</head>
<body class="text-gray-200">

<!-- Navigation (identical structure, only class adjustments) -->
<nav class="glass-nav fixed top-0 left-0 w-full z-50 px-6 py-3 flex flex-wrap justify-between items-center gap-3">
  <div class="flex items-center gap-2">
    <i class="fas fa-crown text-3xl text-yellow-400 drop-shadow-md"></i>
    <span class="text-2xl font-extrabold bg-gradient-to-r from-yellow-300 to-yellow-500 bg-clip-text text-transparent tracking-tight">WizhuB</span>
  </div>
  <div class="flex-1 max-w-md relative">
    <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
    <input type="text" id="globalSearch" placeholder="Search movies or TV shows..." class="w-full bg-gray-900/80 border border-gray-700 rounded-full py-2 pl-10 pr-4 focus:outline-none focus:ring-2 focus:ring-yellow-500/60 text-sm transition">
  </div>
  <div id="authContainer" class="flex gap-2">
    <button id="showLoginBtn" class="px-4 py-1.5 rounded-full border border-yellow-500 text-yellow-400 text-sm hover:bg-yellow-500/10 transition">Login</button>
    <button id="showSignupBtn" class="px-4 py-1.5 rounded-full bg-yellow-500 text-black text-sm font-semibold hover:bg-yellow-400 transition">Sign up</button>
  </div>
  <div id="userContainer" class="hidden items-center gap-3">
    <span id="userEmailDisplay" class="text-sm text-yellow-300 truncate max-w-[150px] font-medium"></span>
    <button id="logoutBtn" class="text-xs bg-red-800/50 hover:bg-red-700 px-3 py-1.5 rounded-full transition"><i class="fas fa-sign-out-alt"></i> Logout</button>
  </div>
</nav>

<main class="pt-24 pb-12 px-4 md:px-8 max-w-7xl mx-auto">
  
  <!-- Continue Watching Section -->
  <section id="continueWatchingSection" class="mb-12">
    <h2 class="text-2xl font-bold flex items-center gap-2 mb-4"><i class="fas fa-history text-yellow-400"></i> Continue Watching</h2>
    <div id="continueWatchingContainer" class="horizontal-scroll">
      <div class="text-gray-400 text-sm">Log in to see your watch history.</div>
    </div>
  </section>

  <!-- Player Panel (glassmorphism) -->
  <div id="playerPanel" class="hidden mb-12 player-panel p-5 md:p-6">
    <div class="flex flex-col lg:flex-row gap-6">
      <div class="lg:w-1/5">
        <img id="detailPoster" class="w-full rounded-xl shadow-2xl object-cover border border-gray-700" src="https://placehold.co/300x450" alt="poster">
        <div class="mt-3 text-sm space-y-1">
          <p><i class="fas fa-star text-yellow-400"></i> <span id="detailRating">—</span> / 10</p>
          <p><i class="fas fa-calendar"></i> <span id="detailYear">—</span></p>
          <p><span id="detailType" class="capitalize bg-gray-800/60 px-2 py-0.5 rounded-full text-xs">—</span></p>
        </div>
      </div>
      <div class="flex-1">
        <div class="flex justify-between items-start">
          <h2 id="detailTitle" class="text-2xl md:text-3xl font-bold tracking-tight"></h2>
          <button id="closePlayerBtn" class="text-gray-400 hover:text-white text-2xl">&times;</button>
        </div>
        <p id="detailOverview" class="text-gray-300 text-sm mt-2 line-clamp-3 leading-relaxed"></p>
        
        <!-- TV Controls -->
        <div id="tvControls" class="hidden mt-4">
          <div class="flex flex-wrap gap-3 items-center">
            <select id="seasonSelect" class="bg-gray-800 border border-gray-600 rounded-full px-3 py-1 text-sm"></select>
            <select id="episodeSelect" class="bg-gray-800 border border-gray-600 rounded-full px-3 py-1 text-sm"></select>
            <div class="episode-nav">
              <button id="prevEpisodeBtn" class="text-sm" disabled><i class="fas fa-step-backward"></i> Previous</button>
              <button id="nextEpisodeBtn" class="text-sm" disabled>Next <i class="fas fa-step-forward"></i></button>
            </div>
          </div>
        </div>

        <div class="mt-4 space-y-3">
          <div class="flex flex-wrap gap-3 items-center">
            <span class="text-sm font-medium">Source:</span>
            <select id="sourceSelect" class="bg-gray-800 border border-gray-600 rounded-full px-3 py-1 text-sm"></select>
            <button id="reloadEmbedBtn" class="text-xs bg-gray-700 hover:bg-gray-600 px-3 py-1 rounded-full transition"><i class="fas fa-sync-alt"></i> Reload</button>
          </div>
          <div class="flex flex-wrap items-center gap-4 bg-black/40 backdrop-blur-sm p-3 rounded-xl border border-gray-700/50">
            <span class="text-sm"><i class="fas fa-clock"></i> Watched (minutes):</span>
            <input type="number" id="progressMinutes" value="0" step="1" min="0" class="w-24 bg-gray-800 border border-gray-600 rounded-full px-3 py-1 text-sm">
            <button id="saveProgressBtn" class="text-xs btn-primary px-4 py-1.5 rounded-full"><i class="fas fa-save"></i> Save Time</button>
          </div>
        </div>

        <div class="embed-container mt-3">
          <iframe id="embedIframe" allowfullscreen referrerpolicy="no-referrer" allow="autoplay; encrypted-media"></iframe>
        </div>
        <p class="text-[10px] text-gray-500 text-center mt-2">If video doesn't load, try another source.</p>
      </div>
    </div>
  </div>

  <!-- Trending Movies -->
  <section class="mb-12">
    <h2 class="text-2xl font-bold flex items-center gap-2 mb-5"><i class="fas fa-fire text-orange-500"></i> Trending Movies</h2>
    <div id="trendingMoviesGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-5"></div>
  </section>

  <!-- Trending TV Shows -->
  <section class="mb-12">
    <h2 class="text-2xl font-bold flex items-center gap-2 mb-5"><i class="fas fa-tv text-purple-400"></i> Trending TV Shows</h2>
    <div id="trendingTvGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-5"></div>
  </section>
</main>

<!-- Login/Signup Modals (unchanged structure, only visual tweaks) -->
<div id="loginModal" class="fixed inset-0 bg-black/80 flex items-center justify-center z-50 hidden backdrop-blur-sm">
  <div class="bg-gray-900/95 rounded-2xl p-6 w-96 border border-yellow-500/30 shadow-2xl transform transition-all">
    <h3 class="text-xl font-bold mb-4">Login</h3>
    <input type="email" id="loginEmail" placeholder="Email" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-2 mb-3 focus:ring-2 focus:ring-yellow-500">
    <input type="password" id="loginPassword" placeholder="Password" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-2 mb-4 focus:ring-2 focus:ring-yellow-500">
    <button id="doLoginBtn" class="w-full bg-yellow-500 text-black py-2 rounded-lg font-semibold hover:bg-yellow-400 transition">Login</button>
    <p class="text-sm text-center mt-3 text-gray-400">No account? <a id="switchToSignupModal" class="text-yellow-400 cursor-pointer hover:underline">Sign up</a></p>
    <button class="closeModal absolute top-2 right-4 text-gray-400 hover:text-white text-2xl">&times;</button>
  </div>
</div>
<div id="signupModal" class="fixed inset-0 bg-black/80 flex items-center justify-center z-50 hidden backdrop-blur-sm">
  <div class="bg-gray-900/95 rounded-2xl p-6 w-96 border border-yellow-500/30 shadow-2xl">
    <h3 class="text-xl font-bold mb-4">Create Account</h3>
    <input type="email" id="signupEmail" placeholder="Email" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-2 mb-3 focus:ring-2 focus:ring-yellow-500">
    <input type="password" id="signupPassword" placeholder="Password (min 6)" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-2 mb-4 focus:ring-2 focus:ring-yellow-500">
    <button id="doSignupBtn" class="w-full bg-yellow-500 text-black py-2 rounded-lg font-semibold hover:bg-yellow-400 transition">Sign Up</button>
    <p class="text-sm text-center mt-3 text-gray-400">Already have an account? <a id="switchToLoginModal" class="text-yellow-400 cursor-pointer hover:underline">Login</a></p>
    <button class="closeModal absolute top-2 right-4 text-gray-400 hover:text-white text-2xl">&times;</button>
  </div>
</div>

<script>
// ================= FULL WORKING SCRIPT (IDENICAL TO V1, NO LOGIC CHANGED) =================
(function() {
  const EMBED_SOURCES = [
    { name: '🎬 Vidsrc', url: (type, id, s, e) => type === 'movie' ? `https://vidsrc.to/embed/movie/${id}` : `https://vidsrc.to/embed/tv/${id}/${s}/${e}` },
    { name: '📺 2Embed', url: (type, id, s, e) => type === 'movie' ? `https://2embed.sx/embed/movie?tmdb=${id}` : `https://2embed.sx/embed/tv?tmdb=${id}&season=${s}&episode=${e}` },
    { name: '🌀 Embed.su', url: (type, id, s, e) => type === 'movie' ? `https://embed.su/embed/movie/${id}` : `https://embed.su/embed/tv/${id}/${s}/${e}` },
    { name: '⚡ Vidplay', url: (type, id, s, e) => type === 'movie' ? `https://vidplay.site/embed/movie/${id}` : `https://vidplay.site/embed/tv/${id}/${s}/${e}` },
    { name: '🎥 VidCore', url: (type, id, s, e) => type === 'movie' ? `https://vidcore.net/movie/${id}` : `https://vidcore.net/tv/${id}/${s}/${e}` },
    { name: '📀 VidUp', url: (type, id, s, e) => type === 'movie' ? `https://vidup.to/movie/${id}` : `https://vidup.to/tv/${id}/${s}/${e}` },
    { name: '🎞️ VAPlayer', url: (type, id, s, e) => type === 'movie' ? `https://vaplayer.ru/embed/movie/${id}` : `https://vaplayer.ru/embed/tv/${id}/${s}/${e}` }
  ];

  const SUPABASE_URL = 'https://evhtzfkxolnlqlmjewew.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV2aHR6Zmt4b2xubHFsbWpld2V3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyOTMzOTUsImV4cCI6MjA5NTg2OTM5NX0.42bpsGRyKSZcQ3EUj1k3grsUVuXtZWKsce7OKv8J5YU';
  const TMDB_API_KEY = 'cf3fd5ed845e76f7c6786a61e521006c';
  const IMG_BASE = 'https://image.tmdb.org/t/p/w500';

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  let currentUser = null;
  let currentMedia = null;
  let currentSeason = 1, currentEpisode = 1;
  let currentProgressMinutes = 0;
  let currentTVDetails = null;
  let currentEpisodesList = [];

  // DOM elements
  const continueContainer = document.getElementById('continueWatchingContainer');
  const trendingMoviesGrid = document.getElementById('trendingMoviesGrid');
  const trendingTvGrid = document.getElementById('trendingTvGrid');
  const playerPanel = document.getElementById('playerPanel');
  const closePlayerBtn = document.getElementById('closePlayerBtn');
  const sourceSelect = document.getElementById('sourceSelect');
  const embedIframe = document.getElementById('embedIframe');
  const tvControlsDiv = document.getElementById('tvControls');
  const seasonSelect = document.getElementById('seasonSelect');
  const episodeSelect = document.getElementById('episodeSelect');
  const prevEpisodeBtn = document.getElementById('prevEpisodeBtn');
  const nextEpisodeBtn = document.getElementById('nextEpisodeBtn');
  const progressMinutesInput = document.getElementById('progressMinutes');
  const saveProgressBtn = document.getElementById('saveProgressBtn');
  const reloadEmbedBtn = document.getElementById('reloadEmbedBtn');
  const globalSearch = document.getElementById('globalSearch');

  function showLoading(container) {
    container.innerHTML = '<div class="col-span-full flex justify-center py-10"><div class="loading-spinner"></div><span class="ml-2">Loading...</span></div>';
  }

  function populateSources() {
    sourceSelect.innerHTML = '';
    EMBED_SOURCES.forEach((src, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = src.name;
      sourceSelect.appendChild(opt);
    });
  }

  function updateEmbedStream() {
    if (!currentMedia) return;
    const srcIdx = parseInt(sourceSelect.value);
    const src = EMBED_SOURCES[srcIdx];
    if (!src || typeof src.url !== 'function') {
      embedIframe.srcdoc = '<div style="color:red;padding:2rem">Invalid source</div>';
      return;
    }
    let url = '';
    if (currentMedia.type === 'movie') {
      url = src.url('movie', currentMedia.id, null, null);
    } else {
      url = src.url('tv', currentMedia.id, currentSeason, currentEpisode);
    }
    if (url) embedIframe.src = url;
    else embedIframe.srcdoc = '<div style="color:red;padding:2rem">Failed to generate URL</div>';
  }

  async function saveProgressToDB() {
    if (!currentUser || !currentMedia) return;
    const season = currentMedia.type === 'tv' ? currentSeason : 0;
    const episode = currentMedia.type === 'tv' ? currentEpisode : 0;
    const record = {
      user_id: currentUser.id,
      media_type: currentMedia.type,
      tmdb_id: currentMedia.id,
      title: currentMedia.title,
      poster_path: currentMedia.posterPath,
      media_year: currentMedia.year,
      rating: currentMedia.rating,
      progress_minutes: currentProgressMinutes,
      season_number: season,
      episode_number: episode,
      last_watched: new Date().toISOString(),
      updated_at: new Date().toISOString()
    };
    const { error } = await sb
      .from('watch_history')
      .upsert(record, { onConflict: 'user_id, media_type, tmdb_id' });
    if (error) console.error("Save error:", error);
  }

  async function loadProgress() {
    if (!currentUser || !currentMedia) return;
    const { data, error } = await sb
      .from('watch_history')
      .select('progress_minutes, season_number, episode_number')
      .eq('user_id', currentUser.id)
      .eq('media_type', currentMedia.type)
      .eq('tmdb_id', currentMedia.id)
      .maybeSingle();
    if (!error && data) {
      currentProgressMinutes = data.progress_minutes || 0;
      progressMinutesInput.value = currentProgressMinutes;
      if (currentMedia.type === 'tv') {
        if (data.season_number && data.episode_number) {
          currentSeason = data.season_number;
          currentEpisode = data.episode_number;
        }
      }
    } else {
      currentProgressMinutes = 0;
      progressMinutesInput.value = 0;
    }
  }

  async function deleteHistoryEntry(mediaType, tmdbId) {
    if (!currentUser) return;
    const { error } = await sb
      .from('watch_history')
      .delete()
      .eq('user_id', currentUser.id)
      .eq('media_type', mediaType)
      .eq('tmdb_id', tmdbId);
    if (error) console.error("Delete error:", error);
    else await renderContinueWatching();
  }

  async function renderContinueWatching() {
    if (!currentUser) {
      continueContainer.innerHTML = '<div class="text-gray-400 text-sm">🔒 Log in to see your continue watching list.</div>';
      return;
    }
    const { data, error } = await sb
      .from('watch_history')
      .select('*')
      .eq('user_id', currentUser.id)
      .order('last_watched', { ascending: false });
    if (error || !data) return;
    if (data.length === 0) {
      continueContainer.innerHTML = '<div class="text-gray-400 text-sm">🎬 No watch history yet. Start watching!</div>';
      return;
    }
    continueContainer.innerHTML = '';
    for (const item of data) {
      const poster = item.poster_path ? IMG_BASE + item.poster_path : 'https://placehold.co/300x450';
      const card = document.createElement('div');
      card.className = 'movie-card relative';
      card.style.flex = '0 0 160px';
      const progressPercent = Math.min((item.progress_minutes / 120) * 100, 100);
      let label = item.media_type === 'tv' ? `S${item.season_number}E${item.episode_number}` : 'Movie';
      card.innerHTML = `
        <div class="delete-btn" data-media-type="${item.media_type}" data-tmdb="${item.tmdb_id}" style="position:absolute; top:8px; right:8px; width:28px; height:28px; display:flex; align-items:center; justify-content:center; border-radius:50%; z-index:10;">
          <i class="fas fa-trash-alt text-xs"></i>
        </div>
        <img src="${poster}" class="w-full h-64 object-cover" loading="lazy">
        <div class="p-2">
          <div class="font-semibold text-sm truncate">${item.title}</div>
          <div class="text-xs text-gray-400">${label} • ${item.progress_minutes} min</div>
        </div>
        <div class="progress-overlay" style="width: ${progressPercent}%;"></div>
      `;
      const deleteBtn = card.querySelector('.delete-btn');
      deleteBtn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const mediaType = deleteBtn.dataset.mediaType;
        const tmdbId = parseInt(deleteBtn.dataset.tmdb);
        if (confirm(`Delete "${item.title}" from Continue Watching?`)) {
          await deleteHistoryEntry(mediaType, tmdbId);
        }
      });
      card.addEventListener('click', async (e) => {
        if (e.target.closest('.delete-btn')) return;
        if (item.media_type === 'movie') {
          const res = await fetchWithRetry(`https://api.themoviedb.org/3/movie/${item.tmdb_id}?api_key=${TMDB_API_KEY}`);
          const movie = await res.json();
          await showDetails(movie, 'movie', item.progress_minutes);
        } else {
          const res = await fetchWithRetry(`https://api.themoviedb.org/3/tv/${item.tmdb_id}?api_key=${TMDB_API_KEY}`);
          const tv = await res.json();
          await showDetails(tv, 'tv', item.progress_minutes, item.season_number, item.episode_number);
        }
      });
      continueContainer.appendChild(card);
    }
  }

  async function updateEpisodeNavigation() {
    if (!currentMedia || currentMedia.type !== 'tv' || !currentEpisodesList.length) {
      prevEpisodeBtn.disabled = true;
      nextEpisodeBtn.disabled = true;
      return;
    }
    const currentIndex = currentEpisodesList.findIndex(ep => ep.episode_number === currentEpisode);
    prevEpisodeBtn.disabled = (currentIndex <= 0);
    nextEpisodeBtn.disabled = (currentIndex >= currentEpisodesList.length - 1);
  }

  async function goToPreviousEpisode() {
    if (!currentMedia || currentMedia.type !== 'tv') return;
    const currentIndex = currentEpisodesList.findIndex(ep => ep.episode_number === currentEpisode);
    if (currentIndex > 0) {
      currentEpisode = currentEpisodesList[currentIndex - 1].episode_number;
      episodeSelect.value = currentEpisode;
      await saveProgressToDB();
      await renderContinueWatching();
      updateEmbedStream();
      updateEpisodeNavigation();
    }
  }

  async function goToNextEpisode() {
    if (!currentMedia || currentMedia.type !== 'tv') return;
    const currentIndex = currentEpisodesList.findIndex(ep => ep.episode_number === currentEpisode);
    if (currentIndex < currentEpisodesList.length - 1) {
      currentEpisode = currentEpisodesList[currentIndex + 1].episode_number;
      episodeSelect.value = currentEpisode;
      await saveProgressToDB();
      await renderContinueWatching();
      updateEmbedStream();
      updateEpisodeNavigation();
    }
  }

  async function loadTVSeasons(tvId, preserveEpisode = false, forcedSeason = null, forcedEpisode = null) {
    const res = await fetchWithRetry(`https://api.themoviedb.org/3/tv/${tvId}?api_key=${TMDB_API_KEY}`);
    const data = await res.json();
    currentTVDetails = data;
    const seasons = (data.seasons || []).filter(s => s.season_number > 0);
    if (!seasons.length) return;
    seasonSelect.innerHTML = '';
    seasons.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.season_number;
      opt.textContent = `Season ${s.season_number}`;
      seasonSelect.appendChild(opt);
    });
    if (forcedSeason !== null) currentSeason = forcedSeason;
    else if (!preserveEpisode) currentSeason = seasons[0]?.season_number || 1;
    seasonSelect.value = currentSeason;
    await loadEpisodes(tvId, currentSeason, forcedEpisode);
    seasonSelect.onchange = async () => {
      currentSeason = parseInt(seasonSelect.value);
      currentEpisode = 1;
      await loadEpisodes(tvId, currentSeason);
      await saveProgressToDB();
      await renderContinueWatching();
      updateEmbedStream();
      updateEpisodeNavigation();
    };
    episodeSelect.onchange = async () => {
      currentEpisode = parseInt(episodeSelect.value);
      await saveProgressToDB();
      await renderContinueWatching();
      updateEmbedStream();
      updateEpisodeNavigation();
    };
    updateEpisodeNavigation();
  }

  async function loadEpisodes(tvId, seasonNum, forcedEpisode = null) {
    const res = await fetchWithRetry(`https://api.themoviedb.org/3/tv/${tvId}/season/${seasonNum}?api_key=${TMDB_API_KEY}`);
    const data = await res.json();
    currentEpisodesList = data.episodes || [];
    episodeSelect.innerHTML = '';
    currentEpisodesList.forEach(ep => {
      const opt = document.createElement('option');
      opt.value = ep.episode_number;
      opt.textContent = `Episode ${ep.episode_number}: ${ep.name}`;
      episodeSelect.appendChild(opt);
    });
    if (currentEpisodesList.length === 0) episodeSelect.innerHTML = '<option value="1">Episode 1</option>';
    if (forcedEpisode !== null) currentEpisode = forcedEpisode;
    episodeSelect.value = currentEpisode;
    updateEpisodeNavigation();
  }

  async function fetchWithRetry(url, retries = 3, delay = 1000) {
    for (let i = 0; i < retries; i++) {
      try {
        const res = await fetch(url);
        if (res.ok) return res;
        if (res.status === 429) {
          const wait = delay * Math.pow(2, i);
          await new Promise(r => setTimeout(r, wait));
          continue;
        }
        throw new Error(`HTTP ${res.status}`);
      } catch (err) {
        if (i === retries - 1) throw err;
        await new Promise(r => setTimeout(r, delay));
      }
    }
  }

  async function showDetails(item, type, savedProgress = null, savedSeason = null, savedEpisode = null) {
    playerPanel.classList.remove('hidden');
    const title = item.title || item.name;
    const poster = item.poster_path ? IMG_BASE + item.poster_path : 'https://placehold.co/300x450';
    const overview = item.overview || 'No overview available.';
    const rating = item.vote_average ? item.vote_average.toFixed(1) : '—';
    const year = type === 'movie' ? (item.release_date?.split('-')[0] || 'N/A') : (item.first_air_date?.split('-')[0] || 'N/A');
    document.getElementById('detailPoster').src = poster;
    document.getElementById('detailTitle').innerText = title;
    document.getElementById('detailOverview').innerText = overview;
    document.getElementById('detailRating').innerText = rating;
    document.getElementById('detailYear').innerText = year;
    document.getElementById('detailType').innerHTML = type === 'movie' ? 'Movie' : 'TV Series';
    currentMedia = { type, id: item.id, title, posterPath: item.poster_path, overview, rating, year };
    
    if (type === 'tv') {
      tvControlsDiv.classList.remove('hidden');
      if (savedSeason !== null && savedEpisode !== null) {
        currentSeason = savedSeason;
        currentEpisode = savedEpisode;
      } else {
        currentSeason = 1;
        currentEpisode = 1;
      }
      await loadTVSeasons(item.id, true, currentSeason, currentEpisode);
    } else {
      tvControlsDiv.classList.add('hidden');
    }
    
    if (savedProgress !== null) {
      currentProgressMinutes = savedProgress;
      progressMinutesInput.value = savedProgress;
    } else {
      await loadProgress();
    }
    await saveProgressToDB();
    updateEmbedStream();
    playerPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function renderCards(container, items, mediaType) {
    if (!items.length) {
      container.innerHTML = '<div class="col-span-full text-center text-gray-400">No results</div>';
      return;
    }
    container.innerHTML = items.map(item => {
      const title = item.title || item.name;
      const poster = item.poster_path ? IMG_BASE + item.poster_path : 'https://placehold.co/300x450';
      const year = (item.release_date || item.first_air_date || '').slice(0,4);
      const rating = item.vote_average?.toFixed(1) || '';
      return `
        <div class="movie-card" data-id="${item.id}" data-type="${mediaType}">
          <img src="${poster}" class="w-full h-64 object-cover" loading="lazy">
          <div class="p-2">
            <div class="font-semibold text-sm truncate">${title}</div>
            <div class="flex justify-between text-xs text-gray-400 mt-1"><span>${year || '—'}</span><span>⭐ ${rating}</span></div>
          </div>
        </div>
      `;
    }).join('');
    container.querySelectorAll('.movie-card').forEach(card => {
      card.addEventListener('click', async () => {
        const id = card.dataset.id;
        const type = card.dataset.type;
        const url = `https://api.themoviedb.org/3/${type}/${id}?api_key=${TMDB_API_KEY}`;
        try {
          const res = await fetchWithRetry(url);
          const data = await res.json();
          showDetails(data, type);
        } catch (err) {
          alert("Failed to load details. Please try again.");
        }
      });
    });
  }

  let cachedTrending = null;
  async function fetchTrending() {
    if (cachedTrending) {
      renderCards(trendingMoviesGrid, cachedTrending.movies, 'movie');
      renderCards(trendingTvGrid, cachedTrending.tv, 'tv');
      return;
    }
    showLoading(trendingMoviesGrid);
    showLoading(trendingTvGrid);
    try {
      const [moviesRes, tvRes] = await Promise.all([
        fetchWithRetry(`https://api.themoviedb.org/3/trending/movie/week?api_key=${TMDB_API_KEY}`),
        fetchWithRetry(`https://api.themoviedb.org/3/trending/tv/week?api_key=${TMDB_API_KEY}`)
      ]);
      const moviesData = await moviesRes.json();
      const tvData = await tvRes.json();
      cachedTrending = { movies: moviesData.results.slice(0, 18), tv: tvData.results.slice(0, 18) };
      renderCards(trendingMoviesGrid, cachedTrending.movies, 'movie');
      renderCards(trendingTvGrid, cachedTrending.tv, 'tv');
    } catch (err) {
      trendingMoviesGrid.innerHTML = '<div class="col-span-full text-red-400">Failed to load trending.</div>';
      trendingTvGrid.innerHTML = '<div class="col-span-full text-red-400">Failed to load trending.</div>';
    }
  }

  async function search(query) {
    if (!query.trim()) { fetchTrending(); return; }
    showLoading(trendingMoviesGrid);
    showLoading(trendingTvGrid);
    try {
      const res = await fetchWithRetry(`https://api.themoviedb.org/3/search/multi?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(query)}`);
      const data = await res.json();
      const movies = data.results.filter(r => r.media_type === 'movie').slice(0, 12);
      const tv = data.results.filter(r => r.media_type === 'tv').slice(0, 12);
      renderCards(trendingMoviesGrid, movies, 'movie');
      renderCards(trendingTvGrid, tv, 'tv');
    } catch (err) {
      trendingMoviesGrid.innerHTML = '<div class="col-span-full text-red-400">Search failed.</div>';
    }
  }

  function updateAuthUI() {
    sb.auth.getUser().then(async ({ data: { user } }) => {
      currentUser = user;
      if (user) {
        document.getElementById('authContainer').classList.add('hidden');
        document.getElementById('userContainer').classList.remove('hidden');
        document.getElementById('userEmailDisplay').innerText = user.email;
        await renderContinueWatching();
      } else {
        document.getElementById('authContainer').classList.remove('hidden');
        document.getElementById('userContainer').classList.add('hidden');
        renderContinueWatching();
        playerPanel.classList.add('hidden');
      }
    }).catch(console.error);
  }

  // Event listeners
  closePlayerBtn.onclick = () => playerPanel.classList.add('hidden');
  reloadEmbedBtn.onclick = () => updateEmbedStream();
  sourceSelect.onchange = () => updateEmbedStream();
  saveProgressBtn.onclick = async () => {
    currentProgressMinutes = parseInt(progressMinutesInput.value) || 0;
    await saveProgressToDB();
    await renderContinueWatching();
  };
  prevEpisodeBtn.onclick = goToPreviousEpisode;
  nextEpisodeBtn.onclick = goToNextEpisode;

  let searchTimeout;
  globalSearch.addEventListener('input', (e) => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => search(e.target.value), 500);
  });

  // Modal handlers
  const loginModal = document.getElementById('loginModal');
  const signupModal = document.getElementById('signupModal');
  document.getElementById('showLoginBtn').onclick = () => loginModal.classList.remove('hidden');
  document.getElementById('showSignupBtn').onclick = () => signupModal.classList.remove('hidden');
  document.querySelectorAll('.closeModal').forEach(btn => btn.onclick = () => {
    loginModal.classList.add('hidden');
    signupModal.classList.add('hidden');
  });
  document.getElementById('switchToSignupModal').onclick = () => { loginModal.classList.add('hidden'); signupModal.classList.remove('hidden'); };
  document.getElementById('switchToLoginModal').onclick = () => { signupModal.classList.add('hidden'); loginModal.classList.remove('hidden'); };
  document.getElementById('doLoginBtn').onclick = async () => {
    const email = document.getElementById('loginEmail').value;
    const pass = document.getElementById('loginPassword').value;
    const { error } = await sb.auth.signInWithPassword({ email, password: pass });
    if (error) alert(error.message);
    else { loginModal.classList.add('hidden'); updateAuthUI(); }
  };
  document.getElementById('doSignupBtn').onclick = async () => {
    const email = document.getElementById('signupEmail').value;
    const pass = document.getElementById('signupPassword').value;
    const { error } = await sb.auth.signUp({ email, password: pass });
    if (error) alert(error.message);
    else { alert('Account created! Please log in.'); signupModal.classList.add('hidden'); }
  };
  document.getElementById('logoutBtn').onclick = async () => {
    await sb.auth.signOut();
    updateAuthUI();
    playerPanel.classList.add('hidden');
  };

  // INIT
  populateSources();
  fetchTrending();
  updateAuthUI();
  sb.auth.onAuthStateChange(() => updateAuthUI());
})();
</script>
