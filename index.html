<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>WizhuB • Stream & Sync</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0c10; font-family: 'Inter', system-ui, sans-serif; }
    .glass-nav {
      background: rgba(10, 12, 16, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(250, 204, 21, 0.2);
    }
    .movie-card {
      transition: transform 0.2s ease, box-shadow 0.2s;
      cursor: pointer;
      background: #14161f;
      border-radius: 1rem;
      overflow: hidden;
    }
    .movie-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 30px -12px rgba(0,0,0,0.6);
    }
    .embed-container {
      background: #000;
      border-radius: 1rem;
      overflow: hidden;
      aspect-ratio: 16/9;
    }
    iframe { width: 100%; height: 100%; border: none; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1e1f2c; }
    ::-webkit-scrollbar-thumb { background: #facc15; border-radius: 10px; }
    input[type=range] {
      -webkit-appearance: none;
      background: #2d2f3e;
      height: 4px;
      border-radius: 5px;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      background: #facc15;
      border-radius: 50%;
      cursor: pointer;
    }
  </style>
</head>

  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV2aHR6Zmt4b2xubHFsbWpld2V3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyOTMzOTUsImV4cCI6MjA5NTg2OTM5NX0.42bpsGRyKSZcQ3EUj1k3grsUVuXtZWKsce7OKv8J5YU';

  const IMG_BASE = 'https://image.tmdb.org/t/p/w500';
  
  const EMBED_SOURCES = [
    { name: '🎬 Vidsrc', url: (type, id, season, ep) => type === 'movie' ? `https://vidsrc.to/embed/movie/${id}` : `https://vidsrc.to/embed/tv/${id}/${season}/${ep}` },
    { name: '📺 2Embed', url: (type, id, season, ep) => type === 'movie' ? `https://2embed.sx/embed/movie?tmdb=${id}` : `https://2embed.sx/embed/tv?tmdb=${id}&season=${season}&episode=${ep}` },

    { name: '⚡ Vidplay', url: (type, id, season, ep) => type === 'movie' ? `https://vidplay.site/embed/movie/${id}` : `https://vidplay.site/embed/tv/${id}/${season}/${ep}` }

<!-- Navigation -->

  <div class="flex items-center gap-2">
    <i class="fas fa-crown text-3xl text-yellow-400"></i>
    <span class="text-2xl font-extrabold bg-gradient-to-r from-yellow-300 to-yellow-500 bg-clip-text text-transparent">WizhuB</span>
  </div>
  <div class="flex-1 max-w-md relative">
    <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
    <input type="text" id="globalSearch" placeholder="Search movies or TV shows..." class="w-full bg-gray-900/80 border border-gray-700 rounded-full py-2 pl-10 pr-4 focus:outline-none focus:ring-2 focus:ring-yellow-500/60 text-sm">
  </div>
  <div id="authContainer" class="flex gap-2">
    <button id="showLoginBtn" class="px-4 py-1.5 rounded-full border border-yellow-500 text-yellow-400 text-sm hover:bg-yellow-500/10 transition">Login</button>
    <button id="showSignupBtn" class="px-4 py-1.5 rounded-full bg-yellow-500 text-black text-sm font-semibold hover:bg-yellow-400 transition">Sign up</button>
  </div>
  <div id="userContainer" class="hidden items-center gap-3">
    <span id="userEmailDisplay" class="text-sm text-yellow-300 truncate max-w-[150px]"></span>
    <button id="logoutBtn" class="text-xs bg-red-800/50 hover:bg-red-700 px-3 py-1.5 rounded-full"><i class="fas fa-sign-out-alt"></i> Logout</button>
  </div>
</nav>

<main class="pt-24 pb-12 px-4 md:px-8 max-w-7xl mx-auto">
  
  <!-- Player Panel (hidden initially) -->
  <div id="playerPanel" class="hidden mb-12 bg-gray-900/80 rounded-2xl p-5 border border-gray-700 shadow-2xl">
    <div class="flex flex-col lg:flex-row gap-6">
      <div class="lg:w-1/5">
        <img id="detailPoster" class="w-full rounded-xl shadow-lg" src="https://via.placeholder.com/300x450?text=Poster" alt="poster">
        <div class="mt-3 text-sm space-y-1">
          <p><i class="fas fa-star text-yellow-400"></i> <span id="detailRating">—</span> / 10</p>
          <p><i class="fas fa-calendar"></i> <span id="detailYear">—</span></p>
          <p><span id="detailType" class="capitalize bg-gray-800 px-2 py-0.5 rounded-full text-xs">—</span></p>
        </div>
      </div>
      <div class="flex-1">
        <div class="flex justify-between items-start">
          <h2 id="detailTitle" class="text-2xl md:text-3xl font-bold"></h2>
          <button id="closePlayerBtn" class="text-gray-400 hover:text-white text-xl">&times;</button>
        </div>
        <p id="detailOverview" class="text-gray-300 text-sm mt-2 line-clamp-3"></p>
        
        <!-- TV controls -->
        <div id="tvControls" class="hidden mt-4 flex flex-wrap gap-3">
          <select id="seasonSelect" class="bg-gray-800 border border-gray-600 rounded-full px-3 py-1 text-sm"></select>
          <select id="episodeSelect" class="bg-gray-800 border border-gray-600 rounded-full px-3 py-1 text-sm"></select>
        </div>

        <!-- Source and progress -->
        <div class="mt-4 space-y-3">
          <div class="flex flex-wrap gap-3 items-center">
            <span class="text-sm">Source:</span>
            <select id="sourceSelect" class="bg-gray-800 border border-gray-600 rounded-full px-3 py-1 text-sm"></select>
            <button id="reloadEmbedBtn" class="text-xs bg-gray-700 hover:bg-gray-600 px-3 py-1 rounded-full"><i class="fas fa-sync-alt"></i> Reload</button>
          </div>
          <div class="flex flex-wrap items-center gap-4 bg-black/30 p-3 rounded-xl">
            <span class="text-sm"><i class="fas fa-chart-line"></i> Your progress:</span>
            <input type="range" id="progressSlider" min="0" max="100" value="0" class="flex-1">
            <span id="progressPercent" class="text-sm text-yellow-400 w-12">0%</span>
            <button id="saveProgressBtn" class="text-xs bg-blue-600 hover:bg-blue-500 px-4 py-1.5 rounded-full"><i class="fas fa-save"></i> Save</button>
            <span id="saveFeedback" class="text-green-400 text-xs hidden">✓ Saved</span>
          </div>
        </div>

        <!-- Embed iframe -->
        <div class="embed-container mt-3">
          <iframe id="embedIframe" allowfullscreen></iframe>
        </div>
        <p class="text-[10px] text-gray-500 text-center mt-2">External providers • Save progress to continue later</p>
      </div>
    </div>
  </div>

  <!-- Trending Movies -->
  <section class="mb-12">
    <h2 class="text-2xl font-bold flex items-center gap-2 mb-5"><i class="fas fa-fire text-orange-500"></i> Trending Movies</h2>
    <div id="trendingMoviesGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-5">
      <div class="animate-pulse bg-gray-800 rounded-xl h-64"></div>
    </div>
  </section>

  <!-- Trending TV Shows -->
  <section class="mb-12">
    <h2 class="text-2xl font-bold flex items-center gap-2 mb-5"><i class="fas fa-tv text-purple-400"></i> Trending TV Shows</h2>
    <div id="trendingTvGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-5">
      <div class="animate-pulse bg-gray-800 rounded-xl h-64"></div>
    </div>
  </section>
</main>

<!-- Continue Watching Sidebar -->
<div id="continueSidebar" class="fixed top-0 right-0 h-full w-80 bg-gray-900/95 backdrop-blur-md border-l border-yellow-500/30 shadow-2xl z-50 transform translate-x-full transition-transform duration-300 p-4 overflow-y-auto">
  <div class="flex justify-between items-center mb-5">
    <h3 class="font-bold text-lg"><i class="fas fa-history"></i> Continue Watching</h3>
    <button id="closeSidebarBtn" class="text-gray-400 hover:text-white"><i class="fas fa-times"></i></button>
  </div>
  <div id="continueList" class="space-y-3"></div>
</div>

<button id="openContinueBtn" class="fixed right-4 bottom-20 bg-yellow-500 text-black p-3 rounded-full shadow-lg hover:bg-yellow-400 transition z-40 hidden">
  <i class="fas fa-clock text-xl"></i>
</button>

<!-- Modals -->

<script>
  (function() {
    log("Initializing WizhuB...");
    
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let currentUser = null;
    let currentMedia = null;
    let currentSeason = 1, currentEpisode = 1;

    // DOM elements
    const trendingMoviesGrid = document.getElementById('trendingMoviesGrid');
    const trendingTvGrid = document.getElementById('trendingTvGrid');
    const playerPanel = document.getElementById('playerPanel');
    const closePlayerBtn = document.getElementById('closePlayerBtn');
    const sourceSelect = document.getElementById('sourceSelect');
    const embedIframe = document.getElementById('embedIframe');
    const tvControlsDiv = document.getElementById('tvControls');
    const seasonSelect = document.getElementById('seasonSelect');
    const episodeSelect = document.getElementById('episodeSelect');
    const progressSlider = document.getElementById('progressSlider');
    const progressPercent = document.getElementById('progressPercent');
    const saveProgressBtn = document.getElementById('saveProgressBtn');
    const reloadEmbedBtn = document.getElementById('reloadEmbedBtn');
    const saveFeedback = document.getElementById('saveFeedback');
    const continueSidebar = document.getElementById('continueSidebar');
    const continueList = document.getElementById('continueList');
    const openContinueBtn = document.getElementById('openContinueBtn');
    const closeSidebarBtn = document.getElementById('closeSidebarBtn');
    const globalSearch = document.getElementById('globalSearch');

    function populateSources() {
      sourceSelect.innerHTML = '';
      EMBED_SOURCES.forEach((src, i) => {
        const option = document.createElement('option');
        option.value = i;
        option.textContent = src.name;
        sourceSelect.appendChild(option);
      });
      log("Sources populated");
    }

    function updateEmbedStream() {
      if (!currentMedia) return;
      const srcIdx = parseInt(sourceSelect.value);
      const source = EMBED_SOURCES[srcIdx];
      let embedUrl = '';
      if (currentMedia.type === 'movie') {
        embedUrl = source.url('movie', currentMedia.id);
      } else {
        embedUrl = source.url('tv', currentMedia.id, currentSeason, currentEpisode);
      }
      log("Updating embed URL:", embedUrl);
      if (embedUrl) embedIframe.src = embedUrl;
      else embedIframe.srcdoc = '<div style="padding:2rem;text-align:center;color:red">Embed source not available</div>';
    }

    async function saveProgress() {
      if (!currentUser) { alert('Please login to save progress'); return; }
      if (!currentMedia) return;
      const progress = parseInt(progressSlider.value);
      const record = {
        user_id: currentUser.id,
        media_type: currentMedia.type,
        tmdb_id: currentMedia.id,
        title: currentMedia.title,
        poster_path: currentMedia.posterPath,
        media_year: currentMedia.year,
        rating: currentMedia.rating,
        progress_percent: progress,
        last_watched: new Date().toISOString(),
        updated_at: new Date().toISOString()
      };
      if (currentMedia.type === 'tv') {
        record.season_number = currentSeason;
        record.episode_number = currentEpisode;
      }
      log("Saving progress:", record);
      const { error } = await supabase
        .from('watch_history')
        .upsert(record, { onConflict: 'user_id, media_type, tmdb_id, season_number, episode_number' });
      if (error) {
        console.error("Save error:", error);
        alert('Save failed: ' + error.message);
      } else {
        saveFeedback.classList.remove('hidden');
        setTimeout(() => saveFeedback.classList.add('hidden'), 2000);
        loadContinueWatching();
      }
    }

    async function loadProgress() {
      if (!currentUser || !currentMedia) return;
      let query = supabase.from('watch_history').select('progress_percent')
        .eq('user_id', currentUser.id)
        .eq('media_type', currentMedia.type)
        .eq('tmdb_id', currentMedia.id);
      if (currentMedia.type === 'tv') {
        query = query.eq('season_number', currentSeason).eq('episode_number', currentEpisode);
      } else {
        query = query.is('season_number', null).is('episode_number', null);
      }
      const { data, error } = await query.maybeSingle();
      if (error) console.error("Load progress error:", error);
      if (data && data.progress_percent !== undefined) {
        progressSlider.value = data.progress_percent;
        progressPercent.innerText = data.progress_percent + '%';
        log("Loaded progress:", data.progress_percent);
      } else {
        progressSlider.value = 0;
        progressPercent.innerText = '0%';
      }
    }

    async function loadContinueWatching() {
      if (!currentUser) {
        openContinueBtn.classList.add('hidden');
        return;
      }
      openContinueBtn.classList.remove('hidden');
      const { data, error } = await supabase
        .from('watch_history')
        .select('*')
        .eq('user_id', currentUser.id)
        .order('last_watched', { ascending: false })
        .limit(10);
      if (error) {
        console.error("Continue watching error:", error);
        return;
      }
      if (!data || data.length === 0) {
        continueList.innerHTML = '<div class="text-gray-400 text-sm">No history yet. Watch something and save progress.</div>';
        return;
      }
      continueList.innerHTML = '';
      data.forEach(item => {
        const div = document.createElement('div');
        div.className = 'bg-gray-800 p-3 rounded-xl cursor-pointer hover:bg-gray-700 transition';
        div.innerHTML = `
          <div class="font-semibold truncate">${item.title}</div>
          <div class="text-xs text-yellow-400 mt-1">${item.progress_percent}% • ${item.media_type === 'tv' ? `S${item.season_number}E${item.episode_number}` : 'Movie'}</div>
        `;
        div.onclick = async () => {
          if (item.media_type === 'movie') {
            const res = await fetch(`https://api.themoviedb.org/3/movie/${item.tmdb_id}?api_key=${TMDB_API_KEY}`);
            const movie = await res.json();
            await showDetails(movie, 'movie');
            progressSlider.value = item.progress_percent;
            progressPercent.innerText = item.progress_percent + '%';
            updateEmbedStream();
          } else {
            const res = await fetch(`https://api.themoviedb.org/3/tv/${item.tmdb_id}?api_key=${TMDB_API_KEY}`);
            const tv = await res.json();
            await showDetails(tv, 'tv');
            currentSeason = item.season_number;
            currentEpisode = item.episode_number;
            await loadTVSeasons(currentMedia.id);
            seasonSelect.value = currentSeason;
            episodeSelect.value = currentEpisode;
            progressSlider.value = item.progress_percent;
            progressPercent.innerText = item.progress_percent + '%';
            updateEmbedStream();
          }
          continueSidebar.classList.add('translate-x-full');
        };
        continueList.appendChild(div);
      });
    }

    async function loadTVSeasons(tvId) {
      const res = await fetch(`https://api.themoviedb.org/3/tv/${tvId}?api_key=${TMDB_API_KEY}`);
      const data = await res.json();
      const seasons = (data.seasons || []).filter(s => s.season_number > 0);
      if (!seasons.length) return;
      seasonSelect.innerHTML = '';
      seasons.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.season_number;
        opt.textContent = `Season ${s.season_number}`;
        seasonSelect.appendChild(opt);
      });
      seasonSelect.value = currentSeason;
      await loadEpisodes(tvId, currentSeason);
      seasonSelect.onchange = async () => {
        currentSeason = parseInt(seasonSelect.value);
        await loadEpisodes(tvId, currentSeason);
        await loadProgress();
        updateEmbedStream();
      };
      episodeSelect.onchange = async () => {
        currentEpisode = parseInt(episodeSelect.value);
        await loadProgress();
        updateEmbedStream();
      };
    }

    async function loadEpisodes(tvId, seasonNum) {
      const res = await fetch(`https://api.themoviedb.org/3/tv/${tvId}/season/${seasonNum}?api_key=${TMDB_API_KEY}`);
      const data = await res.json();
      const episodes = data.episodes || [];
      episodeSelect.innerHTML = '';
      episodes.forEach(ep => {
        const opt = document.createElement('option');
        opt.value = ep.episode_number;
        opt.textContent = `Episode ${ep.episode_number}`;
        episodeSelect.appendChild(opt);
      });
      if (episodes.length === 0) episodeSelect.innerHTML = '<option value="1">Episode 1</option>';
      episodeSelect.value = currentEpisode;
    }

    async function showDetails(item, type) {
      playerPanel.classList.remove('hidden');
      const title = item.title || item.name;
      const poster = item.poster_path ? IMG_BASE + item.poster_path : 'https://via.placeholder.com/300x450?text=No+Image';
      const overview = item.overview || 'No overview available.';
      const rating = item.vote_average ? item.vote_average.toFixed(1) : '—';
      const year = type === 'movie' ? (item.release_date?.split('-')[0] || 'N/A') : (item.first_air_date?.split('-')[0] || 'N/A');
      document.getElementById('detailPoster').src = poster;
      document.getElementById('detailTitle').innerText = title;
      document.getElementById('detailOverview').innerText = overview;
      document.getElementById('detailRating').innerText = rating;
      document.getElementById('detailYear').innerText = year;
      document.getElementById('detailType').innerHTML = type === 'movie' ? 'Movie' : 'TV Series';
      currentMedia = { type, id: item.id, title, posterPath: item.poster_path, overview, rating, year };
      if (type === 'tv') {
        tvControlsDiv.classList.remove('hidden');
        currentSeason = 1;
        currentEpisode = 1;
        await loadTVSeasons(item.id);
      } else {
        tvControlsDiv.classList.add('hidden');
      }
      await loadProgress();
      updateEmbedStream();
      playerPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function renderCards(container, items, mediaType) {
      if (!items.length) {
        container.innerHTML = '<div class="col-span-full text-center text-gray-400">No results</div>';
        return;
      }
      container.innerHTML = items.map(item => {
        const title = item.title || item.name;
        const poster = item.poster_path ? IMG_BASE + item.poster_path : 'https://via.placeholder.com/300x450?text=No+Image';
        const year = (item.release_date || item.first_air_date || '').slice(0,4);
        const rating = item.vote_average?.toFixed(1) || '';
        return `
          <div class="movie-card" data-id="${item.id}" data-type="${mediaType}">
            <img src="${poster}" class="w-full h-64 object-cover" loading="lazy">
            <div class="p-2">
              <div class="font-semibold text-sm truncate">${title}</div>
              <div class="flex justify-between text-xs text-gray-400 mt-1"><span>${year || '—'}</span><span>⭐ ${rating}</span></div>
            </div>
          </div>
        `;
      }).join('');
      container.querySelectorAll('.movie-card').forEach(card => {
        card.addEventListener('click', async () => {
          const id = card.dataset.id;
          const type = card.dataset.type;
          const url = `https://api.themoviedb.org/3/${type}/${id}?api_key=${TMDB_API_KEY}`;
          const res = await fetch(url);
          const data = await res.json();
          showDetails(data, type);
        });
      });
    }

    async function fetchTrending() {
      try {
        const [moviesRes, tvRes] = await Promise.all([
          fetch(`https://api.themoviedb.org/3/trending/movie/week?api_key=${TMDB_API_KEY}`),
          fetch(`https://api.themoviedb.org/3/trending/tv/week?api_key=${TMDB_API_KEY}`)
        ]);
        const moviesData = await moviesRes.json();
        const tvData = await tvRes.json();
        renderCards(trendingMoviesGrid, moviesData.results.slice(0, 18), 'movie');
        renderCards(trendingTvGrid, tvData.results.slice(0, 18), 'tv');
        log("Trending loaded");
      } catch (err) {
        console.error("Trending fetch error:", err);
        trendingMoviesGrid.innerHTML = '<div class="col-span-full text-red-400">API error – check TMDB key</div>';
      }
    }

    async function search(query) {
      if (!query.trim()) { fetchTrending(); return; }
      const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(query)}`);
      const data = await res.json();
      const movies = data.results.filter(r => r.media_type === 'movie').slice(0, 12);
      const tv = data.results.filter(r => r.media_type === 'tv').slice(0, 12);
      renderCards(trendingMoviesGrid, movies, 'movie');
      renderCards(trendingTvGrid, tv, 'tv');
    }

    function updateAuthUI() {
      supabase.auth.getUser().then(({ data: { user }, error }) => {
        if (error) {
          console.error("Auth error:", error);
          return;
        }
        currentUser = user;
        if (user) {
          document.getElementById('authContainer').classList.add('hidden');
          document.getElementById('userContainer').classList.remove('hidden');
          document.getElementById('userEmailDisplay').innerText = user.email;
          loadContinueWatching();
          log("User logged in:", user.email);
        } else {
          document.getElementById('authContainer').classList.remove('hidden');
          document.getElementById('userContainer').classList.add('hidden');
          openContinueBtn.classList.add('hidden');
          playerPanel.classList.add('hidden');
          log("User logged out");
        }
      }).catch(console.error);
    }

    // Modal logic
    const loginModal = document.getElementById('loginModal');
    const signupModal = document.getElementById('signupModal');
    document.getElementById('showLoginBtn').onclick = () => loginModal.classList.remove('hidden');
    document.getElementById('showSignupBtn').onclick = () => signupModal.classList.remove('hidden');
    document.querySelectorAll('.closeModal').forEach(btn => btn.onclick = () => {
      loginModal.classList.add('hidden');
      signupModal.classList.add('hidden');
    });
    document.getElementById('switchToSignupModal').onclick = () => { loginModal.classList.add('hidden'); signupModal.classList.remove('hidden'); };
    document.getElementById('switchToLoginModal').onclick = () => { signupModal.classList.add('hidden'); loginModal.classList.remove('hidden'); };
    document.getElementById('doLoginBtn').onclick = async () => {
      const email = document.getElementById('loginEmail').value;
      const pass = document.getElementById('loginPassword').value;
      const { error } = await supabase.auth.signInWithPassword({ email, password: pass });
      if (error) alert(error.message);
      else { loginModal.classList.add('hidden'); updateAuthUI(); }
    };
    document.getElementById('doSignupBtn').onclick = async () => {
      const email = document.getElementById('signupEmail').value;
      const pass = document.getElementById('signupPassword').value;
      const { error } = await supabase.auth.signUp({ email, password: pass });
      if (error) alert(error.message);
      else { alert('Account created! Please log in.'); signupModal.classList.add('hidden'); }
    };
    document.getElementById('logoutBtn').onclick = async () => {
      await supabase.auth.signOut();
      updateAuthUI();
      playerPanel.classList.add('hidden');
    };

    // Event listeners
    closePlayerBtn.onclick = () => playerPanel.classList.add('hidden');
    reloadEmbedBtn.onclick = () => updateEmbedStream();
    sourceSelect.onchange = () => updateEmbedStream();
    saveProgressBtn.onclick = saveProgress;
    openContinueBtn.onclick = () => continueSidebar.classList.remove('translate-x-full');
    closeSidebarBtn.onclick = () => continueSidebar.classList.add('translate-x-full');
    progressSlider.oninput = () => progressPercent.innerText = progressSlider.value + '%';
    
    let searchTimeout;
    globalSearch.addEventListener('input', (e) => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => search(e.target.value), 500);
    });

    // Initialize
    populateSources();
    fetchTrending();
    updateAuthUI();
    supabase.auth.onAuthStateChange(() => updateAuthUI());
    log("Initialization complete");
  })();
</script>
</body>
</html>
