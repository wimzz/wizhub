<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>WIZHUB</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23facc15'%3E%3Cpath d='M12 2L15 8.5L22 9.5L17 14L18.5 21L12 17.5L5.5 21L7 14L2 9.5L9 8.5L12 2Z'/%3E%3C/svg%3E">
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0c10; font-family: 'Inter', system-ui, sans-serif; }
    .glass-nav {
      background: rgba(10, 12, 16, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(250, 204, 21, 0.2);
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 50;
      padding: 0.75rem 1rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .brand { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; }
    .brand i { font-size: 1.8rem; }
    .brand span {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #facc15, #e5b80b);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: 1px;
    }
    .search-wrapper {
      flex: 1 1 auto;
      min-width: 200px;
      position: relative;
    }
    .search-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: #9ca3af;
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      background: #1a1d24;
      border: 1px solid #2d2f3e;
      border-radius: 2rem;
      padding: 0.6rem 2.5rem 0.6rem 2.5rem;
      color: #f0f0f0;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .search-input:focus {
      outline: none;
      border-color: #facc15;
      box-shadow: 0 0 0 2px rgba(250,204,21,0.2);
    }
    .clear-search {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #9ca3af;
      cursor: pointer;
      display: none;
    }
    .clear-search:hover { color: #facc15; }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
    }
    .nav-btn {
      background: transparent;
      border: 1px solid #facc15;
      color: #facc15;
      padding: 0.4rem 1rem;
      border-radius: 2rem;
      font-size: 0.85rem;
      font-weight: 500;
      transition: all 0.2s;
      cursor: pointer;
      white-space: nowrap;
    }
    .nav-btn:hover {
      background: #facc15;
      color: #0a0c10;
    }
    .nav-btn-disabled {
      opacity: 0.6;
      cursor: not-allowed;
      border-color: gray;
      color: gray;
    }
    .nav-btn-disabled:hover {
      background: transparent;
      color: gray;
    }
    .avatar-wrapper { position: relative; }
    .user-avatar {
      width: 40px;
      height: 40px;
      background: #facc15;
      color: #0a0c10;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1.2rem;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .user-avatar:hover { transform: scale(1.02); }
    .avatar-dropdown {
      position: absolute;
      top: 48px;
      right: 0;
      background: #1e212b;
      border: 1px solid #facc15;
      border-radius: 0.75rem;
      padding: 0.5rem;
      min-width: 130px;
      z-index: 60;
      display: none;
      flex-direction: column;
      gap: 0.25rem;
      backdrop-filter: blur(8px);
    }
    .avatar-dropdown.show { display: flex; }
    .dropdown-item {
      background: transparent;
      color: #e0e0e0;
      border: none;
      padding: 0.5rem 0.75rem;
      border-radius: 0.5rem;
      text-align: left;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.85rem;
      width: 100%;
    }
    .dropdown-item:hover {
      background: #facc15;
      color: #0a0c10;
    }
    @media (max-width: 768px) {
      main { padding-top: 8rem !important; }
    }
    .movie-card {
      transition: transform 0.25s ease, box-shadow 0.25s;
      cursor: pointer;
      background: #14161f;
      border-radius: 1rem;
      overflow: hidden;
      position: relative;
    }
    .movie-card:hover { transform: translateY(-6px); box-shadow: 0 20px 30px -12px rgba(0,0,0,0.6); }
    .progress-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 4px;
      background: #facc15;
      width: 0%;
      transition: width 0.2s;
    }
    .delete-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(0,0,0,0.7);
      border-radius: 50%;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ff5555;
      cursor: pointer;
      z-index: 20;
    }
    .delete-btn:hover { background: #ff5555; color: white; }
    .embed-container {
      background: #000;
      border-radius: 1rem;
      overflow: hidden;
      aspect-ratio: 16/9;
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
    }
    iframe { width: 100%; height: 100%; border: none; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #1e1f2c; }
    ::-webkit-scrollbar-thumb { background: #facc15; border-radius: 10px; }
    .horizontal-scroll {
      display: flex;
      overflow-x: auto;
      gap: 1rem;
      scrollbar-width: thin;
      padding-bottom: 0.5rem;
      -webkit-overflow-scrolling: touch;
    }
    .horizontal-scroll .movie-card { flex: 0 0 140px; }
    @media (min-width: 768px) { .horizontal-scroll .movie-card { flex: 0 0 160px; } }
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    .modal-content {
      background: #1e1f2c;
      border-radius: 1rem;
      padding: 1.5rem;
      width: 90%;
      max-width: 500px;
      max-height: 80vh;
      overflow-y: auto;
    }
    .source-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem;
      background: #2a2c38;
      margin-bottom: 0.5rem;
      border-radius: 0.5rem;
    }
    .trending-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
    }
    @media (min-width: 640px) { .trending-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 768px) { .trending-grid { grid-template-columns: repeat(4, 1fr); } }
    @media (min-width: 1024px) { .trending-grid { grid-template-columns: repeat(5, 1fr); } }
    @media (min-width: 1280px) { .trending-grid { grid-template-columns: repeat(6, 1fr); } }
    input, select, button { font-size: 16px; }

    .player-modern {
      background: linear-gradient(145deg, #101218, #0b0d12);
      border-radius: 1.5rem;
      border: 1px solid rgba(250, 204, 21, 0.15);
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.5);
      overflow: hidden;
    }
    .info-section { padding: 1.5rem; }
    .info-row {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    @media (min-width: 768px) {
      .info-row {
        flex-direction: row;
        align-items: flex-start;
      }
      .poster-col { flex: 0 0 140px; }
      .details-col { flex: 1; }
    }
    .poster-wrapper {
      border-radius: 1rem;
      overflow: hidden;
      background: #07090e;
      box-shadow: 0 10px 20px rgba(0,0,0,0.4);
    }
    .poster-wrapper img { width: 100%; height: auto; display: block; }
    .rating-badge {
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .type-badge {
      background: #facc1522;
      border: 1px solid #facc1544;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      text-transform: uppercase;
      font-weight: 500;
    }
    .overview-text {
      color: #b0b8cc;
      line-height: 1.5;
      font-size: 0.9rem;
    }
    .control-group {
      background: rgba(0,0,0,0.3);
      border-radius: 1rem;
      padding: 0.75rem;
    }
    .select-modern {
      background: #1a1d24;
      border: 1px solid #2d2f3e;
      border-radius: 2rem;
      padding: 0.4rem 1rem;
      font-size: 0.85rem;
      color: white;
      transition: all 0.2s;
    }
    .select-modern:hover, .select-modern:focus { border-color: #facc15; outline: none; }
    .btn-icon {
      background: #1e212b;
      border: none;
      border-radius: 2rem;
      padding: 0.4rem 1rem;
      font-size: 0.8rem;
      font-weight: 500;
      transition: all 0.2s;
      color: #e0e0e0;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-icon:hover { background: #2a2e3a; color: #facc15; transform: translateY(-1px); }
    .btn-primary {
      background: #facc15;
      color: #0a0c10;
      border: none;
      border-radius: 2rem;
      padding: 0.4rem 1.2rem;
      font-weight: 600;
      transition: all 0.2s;
    }
    .btn-primary:hover { background: #e5b80b; transform: translateY(-1px); box-shadow: 0 4px 8px rgba(250,204,21,0.2); }
    .progress-input {
      background: #1a1d24;
      border: 1px solid #2d2f3e;
      border-radius: 2rem;
      padding: 0.4rem 1rem;
      width: 90px;
      text-align: center;
    }
    .episode-nav-modern {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
    }
    .episode-nav-modern button {
      background: #1e212b;
      border: none;
      border-radius: 2rem;
      padding: 0.3rem 1rem;
      font-size: 0.8rem;
      transition: all 0.2s;
    }
    .episode-nav-modern button:hover:not(:disabled) { background: #facc15; color: #0a0c10; }
    .episode-nav-modern button:disabled { opacity: 0.4; cursor: not-allowed; }
    @media (max-width: 768px) {
      .info-section { padding: 1rem; }
      .control-group .flex-wrap { justify-content: center; }
    }
    .copy-title-icon {
      cursor: pointer;
      margin-left: 0.5rem;
      font-size: 0.9rem;
      color: #9ca3af;
      transition: color 0.2s;
    }
    .copy-title-icon:hover { color: #facc15; }
    .title-wrapper {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .continue-section-hidden {
      display: none !important;
    }
    .toast-notification {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #2a2c38;
      color: #facc15;
      padding: 8px 16px;
      border-radius: 9999px;
      font-size: 14px;
      z-index: 300;
      animation: fadeOut 2s forwards;
    }
    @keyframes fadeOut {
      0% { opacity: 1; }
      70% { opacity: 1; }
      100% { opacity: 0; visibility: hidden; }
    }
  </style>
</head>
<body class="text-gray-200">

<nav class="glass-nav">
  <div class="brand" id="brandLogo">
    <i class="fas fa-crown text-yellow-400"></i>
    <span>WIZHUB</span>
  </div>
  <div class="search-wrapper">
    <i class="fas fa-search search-icon"></i>
    <input type="text" id="globalSearch" placeholder="Search movies or TV shows..." class="search-input" autocomplete="off">
    <button id="clearSearchBtn" class="clear-search" aria-label="Clear search"><i class="fas fa-times-circle"></i></button>
  </div>
  <div class="nav-right">
    <a href="oglist.html" class="nav-btn" target="_self"><i class="fas fa-link mr-1"></i> OGList</a>
    <div id="userContainer" class="hidden avatar-wrapper">
      <div class="user-avatar" id="userAvatar">U</div>
      <div id="avatarDropdown" class="avatar-dropdown"><button id="dropdownLogoutBtn" class="dropdown-item">Logout</button></div>
    </div>
    <div id="authContainer" class="flex gap-2">
      <button id="showLoginBtn" class="nav-btn">Login</button>
      <button id="showSignupBtn" class="nav-btn nav-btn-disabled" disabled style="opacity:0.6; cursor:not-allowed;" title="Registration temporarily closed">Sign up (Closed)</button>
    </div>
  </div>
</nav>

<main class="pt-24 pb-12 px-4 md:px-8 max-w-7xl mx-auto">
  <section id="continueWatchingSection" class="mb-12">
    <h2 class="text-xl md:text-2xl font-bold flex items-center gap-2 mb-4"><i class="fas fa-history text-yellow-400"></i> Continue Watching</h2>
    <div id="continueWatchingContainer" class="horizontal-scroll"><div class="text-gray-400 text-sm">Log in to see your watch history.</div></div>
  </section>

  <div id="playerPanel" class="hidden mb-12 player-modern">
    <div class="embed-container"><iframe id="embedIframe" allowfullscreen referrerpolicy="no-referrer" allow="autoplay; encrypted-media"></iframe></div>
    <div class="info-section">
      <div id="tvControls" class="hidden mb-4">
        <div class="control-group flex flex-wrap items-center justify-between gap-3">
          <div class="flex flex-wrap gap-3 items-center">
            <select id="seasonSelect" class="select-modern"></select>
            <select id="episodeSelect" class="select-modern"></select>
          </div>
          <div class="episode-nav-modern">
            <button id="prevEpisodeBtn" class="text-sm" disabled><i class="fas fa-step-backward"></i> Previous</button>
            <button id="nextEpisodeBtn" class="text-sm" disabled>Next <i class="fas fa-step-forward"></i></button>
          </div>
        </div>
      </div>
      <div class="space-y-3 mb-6">
        <div class="control-group flex flex-wrap items-center gap-2">
          <span class="text-sm font-medium text-gray-300">Source:</span>
          <select id="sourceSelect" class="select-modern flex-1 min-w-[130px]"></select>
          <div class="flex flex-wrap gap-2">
            <button id="reloadEmbedBtn" class="btn-icon"><i class="fas fa-sync-alt"></i> Reload</button>
            <button id="nextSourceBtn" class="btn-icon"><i class="fas fa-forward"></i> Next</button>
            <button id="copyUrlBtn" class="btn-icon"><i class="fas fa-copy"></i> Copy URL</button>
            <button id="orderSourcesBtn" class="btn-icon" title="Reorder sources"><i class="fas fa-arrows-alt"></i> Order</button>
          </div>
        </div>
        <div class="control-group flex flex-wrap items-center gap-4">
          <span class="text-sm"><i class="fas fa-clock text-yellow-400"></i> Watched (minutes):</span>
          <input type="number" id="progressMinutes" value="0" step="1" min="0" class="progress-input">
          <button id="saveProgressBtn" class="btn-primary"><i class="fas fa-save"></i> Save Time</button>
        </div>
      </div>
      <div class="info-row">
        <div class="poster-col"><div class="poster-wrapper rounded-xl shadow-lg"><img id="detailPoster" src="https://placehold.co/300x450" alt="poster"></div></div>
        <div class="details-col">
          <div class="flex justify-between items-start flex-wrap gap-2">
            <div class="title-wrapper"><h2 id="detailTitle" class="text-xl md:text-2xl font-bold tracking-tight bg-gradient-to-r from-white to-gray-300 bg-clip-text text-transparent cursor-pointer" title="Click to copy title"></h2><i class="fas fa-copy copy-title-icon" title="Copy title to clipboard"></i></div>
            <button id="closePlayerBtn" class="text-gray-400 hover:text-white text-xl">&times;</button>
          </div>
          <div class="flex flex-wrap items-center gap-3 mt-2">
            <div class="rating-badge"><i class="fas fa-star text-yellow-400 text-xs"></i><span id="detailRating">—</span><span class="text-gray-400 text-xs">/10</span></div>
            <span class="text-sm"><i class="fas fa-calendar-alt text-gray-400 mr-1"></i><span id="detailYear">—</span></span>
            <span class="type-badge" id="detailType">—</span>
          </div>
          <p id="detailOverview" class="overview-text mt-3 text-sm md:text-base leading-relaxed"></p>
        </div>
      </div>
    </div>
  </div>

  <section class="mb-12"><h2 class="text-xl md:text-2xl font-bold flex items-center gap-2 mb-5"><i class="fas fa-fire text-orange-500"></i> Trending Movies</h2><div id="trendingMoviesGrid" class="trending-grid"></div></section>
  <section class="mb-12"><h2 class="text-xl md:text-2xl font-bold flex items-center gap-2 mb-5"><i class="fas fa-tv text-purple-400"></i> Trending TV Shows</h2><div id="trendingTvGrid" class="trending-grid"></div></section>
</main>

<div id="orderModal" class="modal"><div class="modal-content"><h3 class="text-xl font-bold mb-4">Reorder Stream Sources</h3><div id="sourceList" class="mb-4" style="max-height: 50vh; overflow-y: auto;"></div><div class="flex gap-2"><button id="saveOrderBtn" class="bg-green-600 px-4 py-2 rounded-full">Save Order</button><button id="closeOrderBtn" class="bg-gray-600 px-4 py-2 rounded-full">Cancel</button></div></div></div>
<div id="loginModal" class="fixed inset-0 bg-black/80 flex items-center justify-center z-50 hidden"><div class="bg-gray-900 rounded-2xl p-6 w-11/12 max-w-md border border-yellow-500/30 relative"><h3 class="text-xl font-bold mb-4">Login</h3><input type="email" id="loginEmail" placeholder="Email" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-2 mb-3"><input type="password" id="loginPassword" placeholder="Password" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-2 mb-4"><button id="doLoginBtn" class="w-full bg-yellow-500 text-black py-2 rounded-lg font-semibold">Login</button><p class="text-sm text-center mt-3 text-gray-400">New registrations are currently closed.</p><button class="closeModal absolute top-2 right-4 text-gray-400 text-2xl">&times;</button></div></div>

<script>
(function() {
  // ================= SOURCE DEFINITIONS =================
  const SOURCE_DEFINITIONS = [
    { name: 'VixSrc', url: (type, id, s, e, progressSec) => {
        let base = type === 'movie' ? `https://vixsrc.to/movie/${id}` : `https://vixsrc.to/tv/${id}/${s}/${e}`;
        return progressSec > 0 ? base + `?startAt=${progressSec}` : base;
      }
    },
    { name: 'Videasy', url: (type, id, s, e, progressSec) => {
        let base = type === 'movie' ? `https://player.videasy.net/movie/${id}` : `https://player.videasy.net/tv/${id}/${s}/${e}`;
        return progressSec > 0 ? base + `?progress=${progressSec}` : base;
      }
    },
    { name: 'VidFast', url: (type, id, s, e, progressSec) => {
        let base = type === 'movie' ? `https://vidfast.pro/movie/${id}?autoPlay=true` : `https://vidfast.pro/tv/${id}/${s}/${e}?autoPlay=true`;
        if (progressSec > 0) {
          base += `&startAt=${Math.floor(progressSec)}`;
        }
        return base;
      }
    },
    { name: 'VidUp', url: (type, id, s, e) => type === 'movie' ? `https://vidup.to/movie/${id}` : `https://vidup.to/tv/${id}/${s}/${e}` },
    { name: 'VidCore', url: (type, id, s, e) => type === 'movie' ? `https://vidcore.net/movie/${id}` : `https://vidcore.net/tv/${id}/${s}/${e}` },
    { name: 'VidLink', url: (type, id, s, e) => type === 'movie' ? `https://vidlink.pro/movie/${id}` : `https://vidlink.pro/tv/${id}/${s}/${e}` },
    { name: '111Movies', url: (type, id, s, e) => type === 'movie' ? `https://111movies.net/movie/${id}` : `https://111movies.net/tv/${id}/${s}/${e}` },
    { name: 'EmbedMaster', url: (type, id, s, e) => type === 'movie' ? `https://embedmaster.link/movie/${id}` : `https://embedmaster.link/tv/${id}/${s}/${e}` },
    { name: 'ZxcStream', url: (type, id, s, e) => type === 'movie' ? `https://zxcstream.xyz/player/movie/${id}` : `https://zxcstream.xyz/player/tv/${id}/${s}/${e}` },
    { name: 'AnyEmbed', url: (type, id, s, e) => type === 'movie' ? `https://anyembed.xyz/embed/tmdb-movie-${id}` : `https://anyembed.xyz/embed/tmdb-tv-${id}-${s}-${e}` },
    { name: 'Peachify', url: (type, id, s, e) => type === 'movie' ? `https://peachify.top/embed/movie/${id}` : `https://peachify.top/embed/tv/${id}/${s}/${e}` },
    { name: 'FilmU', url: (type, id, s, e) => type === 'movie' ? `https://embed.filmu.in/movie/${id}` : `https://embed.filmu.in/tv/${id}/${s}/${e}` },
    { name: 'Nxsha', url: (type, id, s, e) => type === 'movie' ? `https://web.nxsha.app/embed/movie/${id}` : `https://web.nxsha.app/embed/tv/${id}/${s}/${e}` },
    { name: 'NHD API', url: (type, id, s, e) => {
        return type === 'movie' ? `https://nhdapi.com/embed/movie/${id}` : `https://nhdapi.com/embed/tv/${id}/${s}/${e}`;
      }

  function saveProgressToLocal(record) {

    let all = localStorage.getItem(key);
    let data = all ? JSON.parse(all) : {};
    const itemKey = `${record.media_type}_${record.tmdb_id}`;
    data[itemKey] = {
      media_type: record.media_type,
      tmdb_id: record.tmdb_id,
      title: record.title,
      poster_path: record.poster_path,
      media_year: record.media_year,

    localStorage.setItem(key, JSON.stringify(data));

      if (!raw) return null;
      const data = JSON.parse(raw);
      if (Date.now() - data.time > 30000) {
        localStorage.removeItem('wizhub_emergency_progress');
        return null;
      }
      return data;
    } catch {
      return null;
    }
  }

  async function loadProgress() {
    if (!currentUser || !currentMedia) return;

    // 1) Emergency progress
    const emergency = loadEmergencyProgress();
    if (emergency && emergency.mediaId === currentMedia.id && emergency.mediaType === currentMedia.type) {
      currentProgressSeconds = emergency.seconds;
      currentProgressMinutes = Math.floor(emergency.seconds / 60);
      progressMinutesInput.value = currentProgressMinutes;
      loadedResumeTime = currentProgressSeconds;
      console.log("Loaded emergency progress:", emergency.seconds);
      clearEmergencyProgress();
    }

    // 2) Supabase
    if (supabaseAvailable) {
      try {
        const { data, error } = await sb.from('watch_history')
          .select('progress_minutes, progress_seconds, season_number, episode_number')
          .eq('user_id', currentUser.id)
          .eq('media_type', currentMedia.type)
          .eq('tmdb_id', currentMedia.id)
          .maybeSingle();
        console.log("LOADED from DB:", data);
        if (!error && data) {
          const dbSeconds = data.progress_seconds || 0;
          if (dbSeconds > currentProgressSeconds) {
            currentProgressSeconds = dbSeconds;
            currentProgressMinutes = Math.floor(dbSeconds / 60);
            progressMinutesInput.value = currentProgressMinutes;
          }
          if (currentMedia.type === 'tv') {
            if (data.season_number) currentSeason = data.season_number;
            if (data.episode_number) currentEpisode = data.episode_number;
          }
          loadedResumeTime = currentProgressSeconds;
          console.log("Loaded from DB:", currentProgressSeconds);
          return;
        }
      } catch (err) {
        console.warn("Supabase load error, falling back to localStorage", err);
        supabaseAvailable = false;
      }
    }

    // 3) localStorage fallback
    const localData = loadProgressFromLocal();
    if (localData) {
      const localSeconds = localData.progress_seconds || 0;
      if (localSeconds > currentProgressSeconds) {
        currentProgressSeconds = localSeconds;
        currentProgressMinutes = Math.floor(localSeconds / 60);
        progressMinutesInput.value = currentProgressMinutes;
      }
      if (currentMedia.type === 'tv') {
        if (localData.season_number) currentSeason = localData.season_number;
        if (localData.episode_number) currentEpisode = localData.episode_number;
      }
      loadedResumeTime = currentProgressSeconds;
      console.log("Loaded from localStorage:", localData);
    } else {
      currentProgressSeconds = 0;
      currentProgressMinutes = 0;
      progressMinutesInput.value = 0;
      loadedResumeTime = 0;
    }
  }

  async function updateEpisodeNavigation() {
    if (!currentMedia || currentMedia.type !== 'tv' || !currentEpisodesList.length) {
      prevEpisodeBtn.disabled = true; nextEpisodeBtn.disabled = true; return;
    }
    const idx = currentEpisodesList.findIndex(ep => ep.episode_number === currentEpisode);
    prevEpisodeBtn.disabled = (idx <= 0);
    nextEpisodeBtn.disabled = (idx >= currentEpisodesList.length - 1);
  }
  async function goToPreviousEpisode() {
    if (!currentMedia || currentMedia.type !== 'tv') return;
    const idx = currentEpisodesList.findIndex(ep => ep.episode_number === currentEpisode);
    if (idx > 0) {
      currentEpisode = currentEpisodesList[idx - 1].episode_number;
      episodeSelect.value = currentEpisode;
      await saveProgressToDB();
      await renderContinueWatching();
      updateEmbedStream();
      updateEpisodeNavigation();
    }
  }
  async function goToNextEpisode() {
    if (!currentMedia || currentMedia.type !== 'tv') return;
    const idx = currentEpisodesList.findIndex(ep => ep.episode_number === currentEpisode);
    if (idx < currentEpisodesList.length - 1) {
      currentEpisode = currentEpisodesList[idx + 1].episode_number;
      episodeSelect.value = currentEpisode;
      await saveProgressToDB();
      await renderContinueWatching();
      updateEmbedStream();
      updateEpisodeNavigation();
    }
  }
  async function loadTVSeasons(tvId, preserveEpisode = false, forcedSeason = null, forcedEpisode = null) {
    const res = await fetchWithRetry(`https://api.themoviedb.org/3/tv/${tvId}?api_key=${TMDB_API_KEY}`);
    const data = await res.json();
    currentTVDetails = data;
    const seasons = (data.seasons || []).filter(s => s.season_number > 0);
    if (!seasons.length) return;
    seasonSelect.innerHTML = '';
    seasons.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.season_number;
      opt.textContent = `Season ${s.season_number}`;
      seasonSelect.appendChild(opt);
    });
    if (forcedSeason !== null) currentSeason = forcedSeason;
    else if (!preserveEpisode) currentSeason = seasons[0]?.season_number || 1;
    seasonSelect.value = currentSeason;
    await loadEpisodes(tvId, currentSeason, forcedEpisode);
    seasonSelect.onchange = async () => {
      currentSeason = parseInt(seasonSelect.value);
      currentEpisode = 1;
      await loadEpisodes(tvId, currentSeason);
      await saveProgressToDB();
      await renderContinueWatching();
      updateEmbedStream();
      updateEpisodeNavigation();
    };
    episodeSelect.onchange = async () => {
      currentEpisode = parseInt(episodeSelect.value);
      await saveProgressToDB();
      await renderContinueWatching();
      updateEmbedStream();
      updateEpisodeNavigation();
    };
    updateEpisodeNavigation();
  }
  async function loadEpisodes(tvId, seasonNum, forcedEpisode = null) {
    const res = await fetchWithRetry(`https://api.themoviedb.org/3/tv/${tvId}/season/${seasonNum}?api_key=${TMDB_API_KEY}`);
    const data = await res.json();
    currentEpisodesList = data.episodes || [];
    episodeSelect.innerHTML = '';
    currentEpisodesList.forEach(ep => {
      const opt = document.createElement('option');
      opt.value = ep.episode_number;
      opt.textContent = `Episode ${ep.episode_number}: ${ep.name}`;
      episodeSelect.appendChild(opt);
    });
    if (currentEpisodesList.length === 0) episodeSelect.innerHTML = '<option value="1">Episode 1</option>';
    if (forcedEpisode !== null) currentEpisode = forcedEpisode;
    episodeSelect.value = currentEpisode;
    updateEpisodeNavigation();
  }

  async function fetchWithRetry(url, retries = 3, delay = 1000) {
    for (let i = 0; i < retries; i++) {
      try {
        const res = await fetch(url);
        if (res.ok) return res;
        if (res.status === 429) await new Promise(r => setTimeout(r, delay * Math.pow(2, i)));
        else throw new Error(`HTTP ${res.status}`);
      } catch (err) { if (i === retries - 1) throw err; await new Promise(r => setTimeout(r, delay)); }
    }
  }

  // ========== UPDATE EMBED WITH RESUME TIME ==========
  async function updateEmbedStream() {
    if (!currentMedia) return;
    const srcIdx = parseInt(sourceSelect.value);
    const src = EMBED_SOURCES[srcIdx];
    if (!src || typeof src.url !== 'function') {
      embedIframe.srcdoc = '<div style="color:red;padding:2rem">Invalid source</div>';
      return;
    }
    let url = '';
    if (src.name === 'Videasy' || src.name === 'VidFast' || src.name === 'VixSrc') {
      url = src.url(currentMedia.type, currentMedia.id, currentSeason, currentEpisode, currentProgressSeconds);
    } else {
      url = src.url(currentMedia.type, currentMedia.id, currentSeason, currentEpisode);
    }
    if (url && typeof url.then === 'function') {
      embedIframe.srcdoc = '<div class="text-center py-20 text-gray-400"><i class="fas fa-spinner fa-spin"></i> Loading...</div>';
      try { url = await url; } catch (err) { embedIframe.srcdoc = '<div style="color:red;padding:2rem">Failed to load</div>'; return; }
    }
    if (src.openInNewTab === true && url) { window.open(url, '_blank'); return; }
    console.log("RESUME TIME (seconds)", currentProgressSeconds);
    console.log("FINAL URL", url);
    if (url) embedIframe.src = url;
    else embedIframe.srcdoc = '<div style="color:red;padding:2rem">Invalid URL</div>';

  // ========== AUTO-SAVE CORE ==========
  let autoSaveTimer = null;

  function autoSaveProgress(seconds, sourceName) {
    if (!currentUser || !currentMedia) return;
    const now = Date.now();
    if (now < ignoreAutoSaveUntil) {
      console.log(`Auto-save IGNORED (protection window): ${sourceName} ${seconds}s`);
      return;
    }
    if (seconds <= 0) return;
    // PROTECTION: reject timestamps older than what we loaded (with 5s tolerance)
    if (seconds < loadedResumeTime - 5) {
      console.log(`Auto-save IGNORED (older than loaded): ${sourceName} ${seconds}s < loaded ${loadedResumeTime}s`);
      return;
    }
    if (Math.abs(seconds - currentProgressSeconds) < 1) return;
    currentProgressSeconds = seconds;
    currentProgressMinutes = Math.floor(seconds / 60);
    progressMinutesInput.value = currentProgressMinutes;
    // Track latest known position so stale events are always rejected
    if (seconds > loadedResumeTime) {
      loadedResumeTime = seconds;
    }
    if (autoSaveTimer) clearTimeout(autoSaveTimer);
    autoSaveTimer = setTimeout(() => {
      saveProgressToDB();
    }, 300);
    console.log(`Auto-save from ${sourceName}: ${seconds} seconds`);
  }

  function saveProgressImmediately(seconds, sourceName) {
    if (!currentUser || !currentMedia) return;
    if (seconds <= 0) return;
    // PROTECTION: reject timestamps older than what we loaded (with 5s tolerance)
    if (seconds < loadedResumeTime - 5) {
      console.log(`Immediate save IGNORED (older than loaded): ${sourceName} ${seconds}s < loaded ${loadedResumeTime}s`);
      return;
    }
    currentProgressSeconds = seconds;
    currentProgressMinutes = Math.floor(seconds / 60);
    progressMinutesInput.value = currentProgressMinutes;
    // Track latest known position
    if (seconds > loadedResumeTime) {
      loadedResumeTime = seconds;
    }
    saveProgressToDB();
    console.log(`Immediate save from ${sourceName}: ${seconds}s`);
  }

  // ========== VIDEASY HANDLER (FIXED) ==========
  function handleVideasyMessage(rawData) {
    let parsed;
    try {
      parsed = typeof rawData === 'string' ? JSON.parse(rawData) : rawData;
    } catch {
      return;
    }
    if (!parsed) return;

    let seconds = parsed?.data?.timestamp ?? parsed?.data?.currentTime ?? parsed?.timestamp ?? parsed?.currentTime ?? null;
    const eventType = parsed?.data?.event ?? parsed?.event ?? null;
    const isMediaData = parsed.type === 'MEDIA_DATA';

    if (seconds === null && isMediaData && typeof parsed.data === 'string') {
      try {
        const inner = JSON.parse(parsed.data);
        for (let key in inner) {
          const item = inner[key];
          if (item?.progress?.watched !== undefined && typeof item.progress.watched === 'number') {
            seconds = item.progress.watched;
            break;
          }
        }
      } catch(e) {}
    }

    if (typeof seconds !== 'number' || seconds <= 0) {
      return;
    }

    seconds = Math.floor(seconds);

    // ===== CRITICAL FIX: Check protection BEFORE updating currentProgressSeconds =====
    // MEDIA_DATA contains Videasy's own stored progress — only accept if NEWER than what we have
    if (isMediaData) {
      if (seconds <= currentProgressSeconds) {
        console.log(`Videasy MEDIA_DATA IGNORED (not newer): ${seconds}s <= current ${currentProgressSeconds}s`);
        return;
      }
    } else {
      // Regular player events: reject if significantly older than loaded resume time
      if (seconds < loadedResumeTime - 5) {
        console.log(`Videasy IGNORED (older than loaded): ${seconds}s < loaded ${loadedResumeTime}s`);
        return;
      }
    }

    // Now safe to update state
    currentProgressSeconds = seconds;
    currentProgressMinutes = Math.floor(seconds / 60);
    progressMinutesInput.value = currentProgressMinutes;

    // Track latest known position so future stale events are rejected
    if (seconds > loadedResumeTime) {
      loadedResumeTime = seconds;
    }

    if (eventType === 'pause' || eventType === 'seeked' || eventType === 'ended') {
      saveProgressImmediately(currentProgressSeconds, `Videasy(${eventType})`);
      return;
    }
    autoSaveProgress(currentProgressSeconds, 'Videasy');
  }

  // ========== VIDFAST HANDLER (FIXED) ==========
  const vidfastOrigins = [
    'https://vidfast.pro', 'https://vidfast.in', 'https://vidfast.io',
    'https://vidfast.me', 'https://vidfast.net', 'https://vidfast.pm', 'https://vidfast.xyz'
  ];

  function handleVidFastMessage(data, origin) {
    if (!vidfastOrigins.includes(origin)) return;
    if (!data) return;

    if (data.type === 'PLAYER_EVENT' && data.data) {
      const { event, currentTime, duration } = data.data;
      if (typeof currentTime === 'number' && currentTime > 0) {
        const seconds = Math.floor(currentTime);

        // ===== CRITICAL FIX: Check BEFORE updating state =====
        if (seconds < loadedResumeTime - 5) {
          console.log(`VidFast IGNORED (older than loaded): ${seconds}s < loaded ${loadedResumeTime}s`);
          return;
        }

        currentProgressSeconds = seconds;
        currentProgressMinutes = Math.floor(currentTime / 60);
        progressMinutesInput.value = currentProgressMinutes;

        if (seconds > loadedResumeTime) {
          loadedResumeTime = seconds;
        }

        console.log(`VidFast ${event}: ${currentTime}s / ${duration}s`);

        if (event === 'seeked' || event === 'pause' || event === 'ended') {
          saveProgressImmediately(seconds, `VidFast(${event})`);
        }
        if (event === 'timeupdate' && (seconds - lastVidFastSave) >= 15) {
          lastVidFastSave = seconds;
          autoSaveProgress(seconds, 'VidFast(timeupdate)');
        }
      }
      return;
    }

    // MEDIA_DATA: only update if newer
    if (data.type === 'MEDIA_DATA' && data.data) {
      const mediaKey = currentMedia?.type === 'movie' ? `m${currentMedia.id}` : `t${currentMedia.id}`;
      const media = data.data[mediaKey];
      if (!media) return;

      if (currentMedia?.type === 'tv') {
        const episodeKey = `s${currentSeason}e${currentEpisode}`;
        const ep = media.show_progress?.[episodeKey];
        if (ep?.progress?.watched) {
          const watched = Math.floor(ep.progress.watched);
          if (watched > currentProgressSeconds && watched > loadedResumeTime) {
            currentProgressSeconds = watched;
            currentProgressMinutes = Math.floor(watched / 60);
            progressMinutesInput.value = currentProgressMinutes;
            loadedResumeTime = watched;
            updateEmbedStream();
            console.log(`VidFast restored episode progress: ${episodeKey} = ${watched}s`);
          }
        }
        if (media.progress?.watched) {
          const watched = Math.floor(media.progress.watched);
          if (watched > currentProgressSeconds && watched > loadedResumeTime) {
            autoSaveProgress(watched, 'VidFast(MEDIA_DATA)');
          }
        }
      } else {
        if (media.progress?.watched !== undefined) {
          const watchedSec = Math.floor(media.progress.watched);
          if (watchedSec > currentProgressSeconds && watchedSec > loadedResumeTime) {
            autoSaveProgress(watchedSec, 'VidFast(MEDIA_DATA)');
          }
        }
      }
    }
  }

  // ========== VIXSRC HANDLER (FIXED) ==========
  function handleVixSrcMessage(data, origin) {
    if (!origin.includes('vixsrc') && !origin.includes('vixcloud')) return;
    if (data?.type !== "PLAYER_EVENT") return;
    let eventName = data.data?.event;
    let currentTime = Math.floor(data.data?.currentTime || 0);
    if (!eventName && data.event?.event) {
      eventName = data.event.event;
      currentTime = Math.floor(data.event.currentTime || 0);
    }
    if (currentTime > 0) {
      // ===== CRITICAL FIX: Check BEFORE updating state =====
      if (currentTime < loadedResumeTime - 5) {
        console.log(`VixSrc IGNORED (older than loaded): ${currentTime} < loaded ${loadedResumeTime}`);
        return;
      }
      currentProgressSeconds = currentTime;
      currentProgressMinutes = Math.floor(currentTime / 60);
      progressMinutesInput.value = currentProgressMinutes;

      if (currentTime > loadedResumeTime) {
        loadedResumeTime = currentTime;
      }

      if (eventName === 'seeked' || eventName === 'pause' || eventName === 'ended') {
        saveProgressImmediately(currentTime, `VixSrc(${eventName})`);
      }
      if (eventName === 'timeupdate' && (currentTime - lastVixSrcSaved) >= 15) {
        lastVixSrcSaved = currentTime;
        autoSaveProgress(currentTime, 'VixSrc(timeupdate)');
      }
    }
  }

  // ========== GLOBAL MESSAGE LISTENER ==========
  window.addEventListener("message", (event) => {
    const { origin, data } = event;
    if (!data) return;
    if (origin.includes('videasy')) {
      handleVideasyMessage(data);
      return;
    }
    if (vidfastOrigins.some(o => origin === o)) {
      handleVidFastMessage(data, origin);
      return;
    }
    if (origin.includes('vixsrc') || origin.includes('vixcloud')) {
      handleVixSrcMessage(data, origin);
      return;
    }
  });

  // ========== HEARTBEAT & FALLBACK (FIXED) ==========
  setInterval(async () => {
    if (!currentUser || !currentMedia) return;
    const current = currentProgressSeconds;
    const now = Date.now();
    // Extra protection: don't save if current is somehow less than loaded (shouldn't happen with fix)
    if (current < loadedResumeTime - 5) {
      console.log(`Heartbeat SKIP (current ${current}s < loaded ${loadedResumeTime}s)`);
      return;
    }
    if (current > 0 && (current - lastSaveTimestamp >= 5 || (now - lastSaveTime) > 15000)) {
      lastSaveTimestamp = current;
      lastSaveTime = now;
      await saveProgressToDB();
      console.log(`Heartbeat save: ${current}s`);
    }
  }, 15000);

  setInterval(async () => {
    if (!currentUser || !currentMedia) return;
    const diff = Math.abs(currentProgressSeconds - lastPositionForJump);
    if (diff > 60) {
      // Extra protection: don't save if going backward unexpectedly
      if (currentProgressSeconds < loadedResumeTime - 5) {
        console.log(`Large jump SKIP (current ${currentProgressSeconds}s < loaded ${loadedResumeTime}s)`);
        lastPositionForJump = currentProgressSeconds;
        return;
      }
      lastPositionForJump = currentProgressSeconds;
      await saveProgressToDB();
      console.log(`Large jump save: ${diff} sec`);
    }
  }, 2000);

  // ========== SHOW DETAILS ==========
  async function showDetails(item, type, savedProgress = null, savedSeason = null, savedEpisode = null, savedSeconds = null) {
    playerPanel.classList.remove('hidden');
    const title = item.title || item.name;
    const poster = item.poster_path ? IMG_BASE + item.poster_path : 'https://placehold.co/300x450';

    document.getElementById('detailPoster').src = poster;

    currentMedia = { type, id: item.id, title, posterPath: item.poster_path, overview, rating, year };

        currentSeason = savedSeason;

      await loadTVSeasons(item.id, true, currentSeason, currentEpisode);
    } else {
      tvControlsDiv.classList.add('hidden');
    }

    if (savedSeconds !== null) {
      currentProgressSeconds = savedSeconds;
      currentProgressMinutes = Math.floor(currentProgressSeconds / 60);
      progressMinutesInput.value = currentProgressMinutes;
      loadedResumeTime = currentProgressSeconds;
    } else if (savedProgress !== null) {
      currentProgressSeconds = savedProgress * 60;
      currentProgressMinutes = savedProgress;
      progressMinutesInput.value = savedProgress;
      loadedResumeTime = currentProgressSeconds;
    } else {
      await loadProgress();
    }

    // Protection window (5 seconds) — prevents stale events from overwriting during load
    ignoreAutoSaveUntil = Date.now() + 5000;
    lastPositionForJump = currentProgressSeconds;
    lastVidFastSave = currentProgressSeconds;
    lastVixSrcSaved = currentProgressSeconds;
    lastSaveTimestamp = currentProgressSeconds;
    lastSaveTime = Date.now();

    await updateEmbedStream();
    playerPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // ========== CARD RENDERING ==========
  function renderCards(container, items, mediaType) {
    if (!items.length) { container.innerHTML = '<div class="col-span-full text-center text-gray-400">No results</div>'; return; }
    container.innerHTML = items.map(item => {
      const title = item.title || item.name;
      const poster = item.poster_path ? IMG_BASE + item.poster_path : 'https://placehold.co/300x450';
      const year = (item.release_date || item.first_air_date || '').slice(0,4);
      const rating = item.vote_average?.toFixed(1) || '';
      return `<div class="movie-card" data-id="${item.id}" data-type="${mediaType}">
        <img src="${poster}" class="w-full h-64 object-cover" loading="lazy">
        <div class="p-2"><div class="font-semibold text-sm truncate">${title}</div>
        <div class="flex justify-between text-xs text-gray-400 mt-1"><span>${year || '—'}</span><span>⭐ ${rating}</span></div></div>
      </div>`;
    }).join('');
    container.querySelectorAll('.movie-card').forEach(card => {
      card.addEventListener('click', async () => {
        const id = card.dataset.id, type = card.dataset.type;
        const url = `https://api.themoviedb.org/3/${type}/${id}?api_key=${TMDB_API_KEY}`;
        try { const res = await fetchWithRetry(url); const data = await res.json(); showDetails(data, type); }
        catch (err) { alert("Failed to load details. Please try again."); }
      });
    });
  }

  let cachedTrending = null;
  async function fetchTrending() {
    if (cachedTrending) {
      renderCards(trendingMoviesGrid, cachedTrending.movies, 'movie');
      renderCards(trendingTvGrid, cachedTrending.tv, 'tv');
      return;
    }
    showLoading(trendingMoviesGrid);
    showLoading(trendingTvGrid);
    try {
      const [moviesRes, tvRes] = await Promise.all([
        fetchWithRetry(`https://api.themoviedb.org/3/trending/movie/week?api_key=${TMDB_API_KEY}`),
        fetchWithRetry(`https://api.themoviedb.org/3/trending/tv/week?api_key=${TMDB_API_KEY}`)
      ]);
      const moviesData = await moviesRes.json();
      const tvData = await tvRes.json();
      cachedTrending = { movies: moviesData.results.slice(0, 18), tv: tvData.results.slice(0, 18) };
      renderCards(trendingMoviesGrid, cachedTrending.movies, 'movie');
      renderCards(trendingTvGrid, cachedTrending.tv, 'tv');
    } catch (err) {
      trendingMoviesGrid.innerHTML = '<div class="col-span-full text-red-400">Failed to load trending.</div>';
      trendingTvGrid.innerHTML = '<div class="col-span-full text-red-400">Failed to load trending.</div>';
    }
  }
  async function search(query) {
    if (!query.trim()) { fetchTrending(); return; }
    showLoading(trendingMoviesGrid);
    showLoading(trendingTvGrid);
    try {
      const res = await fetchWithRetry(`https://api.themoviedb.org/3/search/multi?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(query)}`);
      const data = await res.json();
      const movies = data.results.filter(r => r.media_type === 'movie').slice(0, 12);
      const tv = data.results.filter(r => r.media_type === 'tv').slice(0, 12);
      renderCards(trendingMoviesGrid, movies, 'movie');
      renderCards(trendingTvGrid, tv, 'tv');
    } catch (err) { trendingMoviesGrid.innerHTML = '<div class="col-span-full text-red-400">Search failed.</div>'; }
  }

  globalSearch.addEventListener('blur', () => { setTimeout(() => { if (!globalSearch.value.trim()) updateContinueVisibility(); }, 200); });

  // ========== LOGIN MODAL ==========
  const loginModal = document.getElementById('loginModal');
  document.getElementById('showLoginBtn').onclick = () => loginModal.classList.remove('hidden');
  document.querySelectorAll('.closeModal').forEach(btn => btn.onclick = () => { loginModal.classList.add('hidden'); orderModal.style.display = 'none'; });
  document.getElementById('doLoginBtn').onclick = async () => {
    const email = document.getElementById('loginEmail').value;
    const pass = document.getElementById('loginPassword').value;
    const { error } = await sb.auth.signInWithPassword({ email, password: pass });
    if (error) alert(error.message);
    else { loginModal.classList.add('hidden'); updateAuthUI(); }
  };

  // ========== INITIALIZE ==========
  async function init() {
    EMBED_SOURCES = buildOrderedSources(DEFAULT_ORDER_NAMES);
    populateSources();
    await updateAuthUI();
    fetchTrending();
    sb.auth.onAuthStateChange(() => updateAuthUI());
    updateContinueVisibility();
  }
  init();
})();
</script>
</body>
</html>
