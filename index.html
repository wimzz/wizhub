<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>WizhuB – Stream & Sync</title>
  <link rel="stylesheet" href="style.css">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="app-container">
    <!-- Navigation -->
    <nav class="navbar">
      <div class="nav-brand">
        <i class="fas fa-crown"></i>
        <span>WizhuB</span>
      </div>
      <div class="nav-search">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search movies or TV series...">
      </div>
      <div class="nav-auth" id="authButtons">
        <button id="loginBtn" class="btn-outline">Login</button>
        <button id="signupBtn" class="btn-primary">Sign Up</button>
      </div>
      <div class="nav-user" id="userPanel" style="display: none;">
        <span id="userEmail"></span>
        <button id="logoutBtn" class="btn-outline-small">Logout</button>
      </div>
    </nav>

    <!-- Main Content -->
    <main>
      <!-- Hero / Trending section -->
      <section class="trending-section">
        <div class="section-header">
          <h2><i class="fas fa-fire-flame"></i> Trending Now</h2>
          <button id="clearDetailBtn" class="close-player-btn">✕ Close Player</button>
        </div>
        <div id="moviesGrid" class="movies-grid">
          <!-- cards injected here -->
        </div>
      </section>

      <!-- Player & Details Panel (hidden initially) -->
      <div id="detailPanel" class="detail-panel hidden">
        <div class="detail-container">
          <div class="detail-poster">
            <img id="detailPoster" alt="Poster">
          </div>
          <div class="detail-info">
            <h1 id="detailTitle"></h1>
            <div class="detail-meta">
              <span><i class="fas fa-star"></i> <span id="detailRating"></span> / 10</span>
              <span><i class="fas fa-calendar"></i> <span id="detailYear"></span></span>
              <span id="detailType" class="media-type-badge"></span>
            </div>
            <p id="detailOverview" class="overview"></p>
            
            <!-- TV Controls (hidden for movies) -->
            <div id="tvControls" class="tv-controls hidden">
              <select id="seasonSelect"></select>
              <select id="episodeSelect"></select>
            </div>

            <!-- Embed Source & Progress -->
            <div class="embed-controls">
              <div class="source-row">
                <label>Stream source:</label>
                <select id="sourceSelect"></select>
                <button id="refreshEmbedBtn" class="icon-btn"><i class="fas fa-sync-alt"></i> Reload</button>
              </div>
              <div class="progress-row">
                <label><i class="fas fa-clock"></i> Resume at (min):</label>
                <input type="number" id="progressMinutes" value="0" step="1" min="0">
                <button id="jumpToTimeBtn" class="secondary-btn">Jump</button>
                <button id="saveProgressBtn" class="primary-btn"><i class="fas fa-save"></i> Save Progress</button>
                <span id="savedProgressBadge" class="saved-badge hidden">✓ Saved</span>
              </div>
            </div>

            <!-- Embed Iframe -->
            <div class="embed-wrapper">
              <iframe id="embedIframe" allowfullscreen allow="autoplay; encrypted-media"></iframe>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Continue Watching Sidebar -->
    <aside id="continuePanel" class="continue-sidebar">
      <div class="sidebar-header">
        <h3><i class="fas fa-history"></i> Continue Watching</h3>
        <button id="closeContinueBtn"><i class="fas fa-times"></i></button>
      </div>
      <div id="continueList" class="continue-list"></div>
    </aside>
  </div>

  <!-- Login/ Signup Modals -->
  <div id="loginModal" class="modal">
    <div class="modal-content">
      <span class="close-modal">&times;</span>
      <h3>Login to WizhuB</h3>
      <input type="email" id="loginEmail" placeholder="Email">
      <input type="password" id="loginPassword" placeholder="Password">
      <button id="doLoginBtn" class="btn-primary">Login</button>
      <p>No account? <a id="switchToSignup">Sign up</a></p>
    </div>
  </div>
  <div id="signupModal" class="modal">
    <div class="modal-content">
      <span class="close-modal">&times;</span>
      <h3>Create Account</h3>
      <input type="email" id="signupEmail" placeholder="Email">
      <input type="password" id="signupPassword" placeholder="Password (min 6 chars)">
      <button id="doSignupBtn" class="btn-primary">Sign Up</button>
      <p>Already have an account? <a id="switchToLogin">Login</a></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
